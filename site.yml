---
# =============================================================================
# HA ZFS-over-iSCSI SAN — Main Deployment Playbook
# =============================================================================
#
# Usage:
#   # Full deployment (all roles, all nodes):
#   ansible-playbook -i inventory.yml site.yml
#
#   # Existing cluster bootstrap on bootc-based nodes (packages already baked into the image):
#   ansible-playbook -i inventory.yml site.yml -e bootc_skip_packages=true
#
#   # Only hardening + common base:
#   ansible-playbook -i inventory.yml site.yml --tags base
#
#   # Only ZFS + iSCSI setup on storage nodes:
#   ansible-playbook -i inventory.yml site.yml --tags storage
#
#   # Only Pacemaker cluster setup:
#   ansible-playbook -i inventory.yml site.yml --tags cluster
#
#   # Only services (NFS, SMB, iSCSI client target):
#   ansible-playbook -i inventory.yml site.yml --tags services
#
#   # Dry run:
#   ansible-playbook -i inventory.yml site.yml --check --diff
#
# Prerequisites:
#   - Fresh Debian 12, Ubuntu 22.04/24.04, Rocky Linux 9, AlmaLinux 9, or CentOS Stream 9 minimal install on all three nodes
#   - SSH key access as storageadmin with sudo
#   - Network connectivity on management VLAN between all nodes
#   - Disks identified and listed in host_vars
#
# IMPORTANT:
#   This playbook configures everything UP TO pool creation. The actual
#   `zpool create` command with cross-node mirror pairs requires manual
#   verification of iSCSI device paths (they vary per environment).
#   A helper script is generated at /root/create-pool.sh on the active node.
#

# ─── Pre-flight: Validate credentials are not default placeholders ──────────
- name: "Validate credentials have been customized"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert sensitive variables are not default placeholders
      ansible.builtin.assert:
        that:
          - "'CHANGEME' not in (hacluster_password | string)"
          - "'CHANGEME' not in (iscsi_chap_password | string)"
          - "'CHANGEME' not in (iscsi_mutual_chap_password | string)"
          - stonith_passwords_ok
          - "'your-key-here' not in (admin_ssh_pubkey | string)"
          - admin_ssh_pubkey | length > 20
        fail_msg: |
          SECURITY ERROR: Default placeholder credentials detected.
          Update before deploying:
            hacluster_password         — ansible-vault encrypt_string 'yourpassword'
            iscsi_chap_password        — backend replication CHAP (group_vars/storage_nodes/iscsi.yml)
            iscsi_mutual_chap_password — backend replication mutual CHAP (group_vars/storage_nodes/iscsi.yml)
            stonith_nodes.<node>.password — ansible-vault encrypt_string 'yourpassword'
            admin_ssh_pubkey           — replace with your actual SSH public key
          Note: client-facing iSCSI CHAP is configured per-initiator in client_vlans[].iscsi_acls
          or per-TPG in client_vlans[].iscsi_chap_password — checked separately below.
      vars:
        hacluster_password: "{{ hostvars[groups['storage_nodes'][0]].hacluster_password | default('') }}"
        iscsi_chap_password: "{{ hostvars[groups['storage_nodes'][0]].iscsi_chap_password | default('') }}"
        iscsi_mutual_chap_password: "{{ hostvars[groups['storage_nodes'][0]].iscsi_mutual_chap_password | default('') }}"
        _stonith_nodes: "{{ hostvars[groups['storage_nodes'][0]].stonith_nodes | default({}) }}"
        stonith_passwords_ok: >-
          {{
            _stonith_nodes.values()
            | selectattr('password', 'defined')
            | map(attribute='password')
            | map('string')
            | select('search', 'CHANGEME')
            | list | length == 0
          }}

    - name: Assert mutual CHAP password differs from forward CHAP password
      ansible.builtin.assert:
        that:
          - iscsi_chap_password != iscsi_mutual_chap_password
        fail_msg: |
          CONFIGURATION ERROR: iscsi_chap_password and iscsi_mutual_chap_password must be different.
          iSCSI rejects identical bidirectional CHAP credentials.
          Set distinct vault-encrypted values for each in group_vars/storage_nodes/iscsi.yml.
      vars:
        iscsi_chap_password: "{{ hostvars[groups['storage_nodes'][0]].iscsi_chap_password | default('') }}"
        iscsi_mutual_chap_password: "{{ hostvars[groups['storage_nodes'][0]].iscsi_mutual_chap_password | default('') }}"
      when: hostvars[groups['storage_nodes'][0]].iscsi_mutual_chap_enabled | default(false) | bool

    - name: Assert per-initiator CHAP passwords do not contain CHANGEME
      ansible.builtin.assert:
        that:
          - "'CHANGEME' not in (item | string)"
        fail_msg: |
          SECURITY ERROR: Default placeholder detected in a per-initiator chap_password in client_vlans.
          Vault-encrypt all chap_password values in iscsi_acls before deploying.
      loop: >-
        {{
          client_vlans
          | selectattr('services', 'contains', 'iscsi')
          | map(attribute='iscsi_acls', default=[])
          | flatten
          | select('mapping')
          | selectattr('chap_password', 'defined')
          | map(attribute='chap_password')
          | list
        }}

    - name: Assert per-TPG CHAP passwords do not contain CHANGEME
      ansible.builtin.assert:
        that:
          - "'CHANGEME' not in (item | string)"
        fail_msg: |
          SECURITY ERROR: Default placeholder detected in iscsi_chap_password for a generate_node_acls VLAN.
          Vault-encrypt all iscsi_chap_password values in client_vlans before deploying.
      loop: >-
        {{
          client_vlans
          | selectattr('services', 'contains', 'iscsi')
          | selectattr('generate_node_acls', 'defined')
          | selectattr('generate_node_acls')
          | selectattr('iscsi_chap_password', 'defined')
          | map(attribute='iscsi_chap_password')
          | list
        }}

# ─── Pre-run: Warn if cluster is already deployed and degraded ──────────────
- name: "Pre-run cluster health check (storage nodes)"
  hosts: storage_nodes
  gather_facts: false
  tags: [always]
  tasks:
    - name: Check for existing pacemaker cluster
      ansible.builtin.command: pcs cluster status
      register: existing_cluster_status
      changed_when: false
      failed_when: false

    - name: Warn if running on degraded cluster
      ansible.builtin.fail:
        msg: |
          WARNING: Pacemaker cluster exists and appears degraded.
          pcs cluster status output:
          {{ existing_cluster_status.stdout }}

          Investigate before re-running. To bypass: -e 'skip_cluster_check=true'
      when:
        - existing_cluster_status.rc == 0
        - >-
          'offline' in existing_cluster_status.stdout.lower() or
          'FAILED' in existing_cluster_status.stdout
        - not (skip_cluster_check | default(false) | bool)

# ─── Pre-flight: Validate supported OS on all cluster nodes ─────────────────
- name: "Validate supported operating system (all nodes)"
  hosts: cluster
  gather_facts: true
  tags: [always]
  tasks:
    - name: Assert this OS is supported by the playbook
      ansible.builtin.assert:
        that:
          - >-
            (ansible_distribution == 'Debian' and ansible_distribution_major_version == '12') or
            (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version in ['22', '24']) or
            (ansible_distribution in ['Rocky', 'AlmaLinux', 'CentOS'] and ansible_distribution_major_version == '9')
        fail_msg: >
          Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}.
          Supported: Debian 12, Ubuntu 22.04/24.04, Rocky Linux 9, AlmaLinux 9, CentOS Stream 9.

# ─── Play 1: Base setup on ALL nodes ────────────────────────────────────────
- name: "Base OS setup and hardening (all nodes)"
  hosts: cluster
  tags: [base]
  roles:
    - common
    - hardening
    - networking   # opt-in: only does work if networking_manage: true

# ─── Play 2: ZFS + iSCSI on STORAGE nodes ──────────────────────────────────
- name: "ZFS and iSCSI backend (storage nodes only)"
  hosts: storage_nodes
  tags: [storage]
  roles:
    - zfs
    - iscsi-target
    - iscsi-initiator

# ─── Play 3: Pacemaker/Corosync on ALL cluster nodes ───────────────────────
- name: "Pacemaker / Corosync cluster (all nodes)"
  hosts: cluster
  tags: [cluster]
  roles:
    - pacemaker

# ─── Play 4: HA services on STORAGE nodes ──────────────────────────────────
- name: "NFS, SMB, iSCSI client services (storage nodes only)"
  hosts: storage_nodes
  tags: [services]
  roles:
    - services

# ─── Play 5: Cockpit + Houston UI on STORAGE nodes ─────────────────────────
- name: "Cockpit + 45Drives Houston plugins (storage nodes)"
  hosts: storage_nodes
  tags: [cockpit]
  roles:
    - cockpit

# ─── Play 6: Monitoring on ALL nodes ───────────────────────────────────────
- name: "Monitoring (node_exporter on all nodes)"
  hosts: cluster
  tags: [monitoring]
  roles:
    - monitoring
