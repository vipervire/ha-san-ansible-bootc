---
# roles/cockpit/tasks/Ubuntu.yml — Ubuntu-specific Cockpit installation

- name: Install Cockpit
  ansible.builtin.apt:
    name: "{{ _cockpit_packages }}"
    state: present

# ─── 45Drives Houston plugins ─────────────────────────────────────────────
- name: Download 45Drives GPG signing key (ASCII-armored)
  ansible.builtin.get_url:
    url: https://repo.45drives.com/key/gpg.asc
    dest: /tmp/45drives-gpg.asc
    mode: "0644"
  register: key_download

- name: Verify 45Drives GPG key fingerprint
  # Guards against CDN compromise or DNS hijack substituting a malicious key.
  # Fingerprint is pinned in group_vars/all.yml (fortyfive_drives_gpg_fingerprint).
  ansible.builtin.shell:
    cmd: >
      gpg --with-fingerprint --with-colons /tmp/45drives-gpg.asc 2>/dev/null
      | grep -i "{{ fortyfive_drives_gpg_fingerprint }}"
  changed_when: false
  when: key_download is succeeded

- name: Dearmor 45Drives GPG signing key into keyring
  ansible.builtin.command:
    cmd: "gpg --batch --yes --dearmor -o {{ _45drives_keyring_path }} /tmp/45drives-gpg.asc"
  when: key_download is changed

- name: Remove temporary 45Drives GPG key file
  ansible.builtin.file:
    path: /tmp/45drives-gpg.asc
    state: absent

- name: Add 45Drives apt repository
  ansible.builtin.apt_repository:
    repo: "{{ _45drives_repo_url }}"
    state: present
    filename: 45drives
  when: key_download is succeeded

- name: Update apt cache after adding 45Drives repo
  ansible.builtin.apt:
    update_cache: true
  when: key_download is changed

- name: Install 45Drives Houston Cockpit plugins
  ansible.builtin.apt:
    name:
      - cockpit-file-sharing
      - cockpit-identities
      - cockpit-navigator
      - cockpit-zfs
      - cockpit-scheduler
    state: present
  ignore_errors: true  # repo may not have packages for every Ubuntu release
