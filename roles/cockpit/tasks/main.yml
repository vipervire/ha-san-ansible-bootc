---
# roles/cockpit/tasks/main.yml — Cockpit + 45Drives Houston plugins

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Load distribution-specific variable overrides
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true
  when: ansible_distribution != ansible_os_family

- name: Include OS-specific Cockpit installation tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      paths:
        - "{{ role_path }}/tasks"
  when: not (bootc_skip_packages | default(false))

# ─── Shared Cockpit configuration (OS-independent) ──────────────────────────

# Pacemaker manages the Cockpit socket on storage nodes (VIP follows the active node).
- name: Disable Cockpit auto-start on storage nodes (Pacemaker manages this)
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: false
    state: stopped

# ─── Bind Cockpit to management interface only (defense-in-depth) ───────────
- name: Create cockpit.socket drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/cockpit.socket.d
    state: directory
    mode: "0755"

- name: Deploy cockpit.socket listen override (management VLAN only)
  ansible.builtin.template:
    src: cockpit-socket-override.conf.j2
    dest: /etc/systemd/system/cockpit.socket.d/listen.conf
    mode: "0644"
  notify: restart cockpit

# ─── Custom TLS certificate for Cockpit (optional) ────────────────────────
- name: Create Cockpit TLS cert directory
  ansible.builtin.file:
    path: /etc/cockpit/ws-certs.d
    state: directory
    mode: "0700"
  when: cockpit_tls_cert_file is defined and cockpit_tls_key_file is defined

- name: Deploy custom Cockpit TLS certificate
  ansible.builtin.copy:
    src: "{{ cockpit_tls_cert_file }}"
    dest: /etc/cockpit/ws-certs.d/10-custom.crt
    mode: "0644"
  when: cockpit_tls_cert_file is defined
  notify: restart cockpit

- name: Deploy custom Cockpit TLS key
  ansible.builtin.copy:
    src: "{{ cockpit_tls_key_file }}"
    dest: /etc/cockpit/ws-certs.d/10-custom.key
    mode: "0600"
  when: cockpit_tls_key_file is defined
  notify: restart cockpit
