---
# roles/zfs/tasks/main.yml — ZFS installation and configuration
# Dispatches to OS-specific task files for package installation,
# then runs shared ZFS configuration tasks.

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Load distribution-specific variable overrides
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true
  when: ansible_distribution != ansible_os_family

- name: Include OS-specific ZFS installation tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      paths:
        - "{{ role_path }}/tasks"
  when: not (bootc_skip_packages | default(false))

# ─── Shared ZFS configuration (OS-independent) ──────────────────────────────

# Compute ARC max dynamically: 50% of total RAM, unless overridden per-host via zfs_arc_max
- name: Set ZFS ARC max (dynamic unless overridden in host_vars)
  ansible.builtin.set_fact:
    _zfs_arc_max: "{{ zfs_arc_max | default((ansible_memtotal_mb * 0.5 * 1024 * 1024) | int) }}"

- name: Deploy ZFS module parameters
  ansible.builtin.template:
    src: zfs-modprobe.conf.j2
    dest: /etc/modprobe.d/zfs.conf
    mode: "0644"
  notify: reload zfs module params

- name: Ensure ZFS kernel module is loaded
  community.general.modprobe:
    name: zfs
    state: present

- name: Enable ZFS services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - zfs-import-cache
    - zfs-mount
    - zfs-zed
    - zfs.target

- name: Configure sanoid for automated snapshots
  when: sanoid_install | default(false)
  block:
    - name: Check if sanoid binary is present
      ansible.builtin.stat:
        path: /usr/sbin/sanoid
      register: _sanoid_binary

    - name: Deploy sanoid configuration
      ansible.builtin.template:
        src: sanoid.conf.j2
        dest: /etc/sanoid/sanoid.conf
        mode: "0644"
      when: _sanoid_binary.stat.exists

    - name: Enable sanoid timer
      ansible.builtin.systemd:
        name: sanoid.timer
        enabled: true
        state: started
      when: _sanoid_binary.stat.exists

# ─── ZFS Dataset Creation ──────────────────────────────────────────────────
- name: Check if ZFS pool is imported
  ansible.builtin.command:
    cmd: zpool list {{ zfs_pool_name }}
  register: zpool_check
  changed_when: false
  failed_when: false

- name: Create ZFS datasets
  community.general.zfs:
    name: "{{ item.name }}"
    state: present
    extra_zfs_properties: "{{ item.properties | default({}) }}"
  loop: "{{ zfs_datasets | default([]) }}"
  when:
    - zfs_datasets is defined
    - zpool_check.rc == 0

# ─── ZFS Scrub Automation ──────────────────────────────────────────────────
- name: Deploy ZFS scrub wrapper script
  ansible.builtin.template:
    src: zfs-scrub-wrapper.sh.j2
    dest: /usr/local/bin/zfs-scrub-wrapper
    mode: "0755"
  when: zfs_scrub_enabled | default(true)

- name: Deploy ZFS scrub systemd service
  ansible.builtin.template:
    src: zfs-scrub.service.j2
    dest: /etc/systemd/system/zfs-scrub@{{ zfs_pool_name }}.service
    mode: "0644"
  when: zfs_scrub_enabled | default(true)
  notify: reload systemd

- name: Deploy ZFS scrub systemd timer
  ansible.builtin.template:
    src: zfs-scrub.timer.j2
    dest: /etc/systemd/system/zfs-scrub@{{ zfs_pool_name }}.timer
    mode: "0644"
  when: zfs_scrub_enabled | default(true)
  notify: reload systemd

- name: Enable and start ZFS scrub timer
  ansible.builtin.systemd:
    name: zfs-scrub@{{ zfs_pool_name }}.timer
    enabled: true
    state: started
    daemon_reload: true
  when: zfs_scrub_enabled | default(true)

# ─── ZED → ntfy event notifications ────────────────────────────────────────
- name: Ensure ZED event handler directory exists
  ansible.builtin.file:
    path: /etc/zfs/zed.d
    state: directory
    mode: "0755"
  when: zed_ntfy_enabled | default(false)

- name: Deploy ZED ntfy notification handler
  ansible.builtin.template:
    src: zed-ntfy.sh.j2
    dest: /etc/zfs/zed.d/all-zed-ntfy.sh
    mode: "0755"
  when: zed_ntfy_enabled | default(false)
  notify: restart zfs-zed

- name: Set ZED notification verbosity
  ansible.builtin.lineinfile:
    path: /etc/zfs/zed.rc
    regexp: '^#?ZED_NOTIFY_VERBOSE='
    line: "ZED_NOTIFY_VERBOSE=0"
  when: zed_ntfy_enabled | default(false)

# ─── Syncoid offsite replication (optional) ────────────────────────────────
- name: Check if syncoid binary is present
  ansible.builtin.stat:
    path: /usr/sbin/syncoid
  register: _syncoid_binary
  when: syncoid_enabled | default(false)

- name: Deploy syncoid replication systemd service
  ansible.builtin.template:
    src: syncoid.service.j2
    dest: /etc/systemd/system/syncoid-replication.service
    mode: "0644"
  when:
    - syncoid_enabled | default(false)
    - _syncoid_binary.stat.exists | default(false)
  notify: reload systemd

- name: Deploy syncoid replication systemd timer
  ansible.builtin.template:
    src: syncoid.timer.j2
    dest: /etc/systemd/system/syncoid-replication.timer
    mode: "0644"
  when:
    - syncoid_enabled | default(false)
    - _syncoid_binary.stat.exists | default(false)
  notify: reload systemd

- name: Enable syncoid replication timer
  ansible.builtin.systemd:
    name: syncoid-replication.timer
    enabled: true
    state: started
    daemon_reload: true
  when:
    - syncoid_enabled | default(false)
    - _syncoid_binary.stat.exists | default(false)
