---
# roles/monitoring/defaults/main.yml — Monitoring role defaults

# Cluster metrics (Pacemaker/Corosync via ha_cluster_exporter)
ha_cluster_monitoring_enabled: true

# ZFS scrub metrics (textfile exporter via node_exporter)
zfs_scrub_monitoring_enabled: true

# SMART disk health monitoring (storage nodes only)
smart_monitoring_enabled: true

# ECC memory monitoring via rasdaemon (not all hardware has ECC)
ras_monitoring_enabled: false

# NIC/HBA/SFP temperature monitoring (sysfs hwmon + ethtool + optional MFT)
# Graceful no-op on hardware without hwmon or SFP transceivers.
hwtemp_monitoring_enabled: true

# Install NVIDIA Mellanox Firmware Tools for ConnectX-3 (mlx4) chip temperature.
# Required for NIC chip temps on cards without hwmon. Adds MLNX_OFED repo.
mellanox_mft_install: false

# node_exporter TLS (opt-in)
node_exporter_tls_enabled: false
# node_exporter_cert_file: /etc/ssl/certs/node-exporter.crt
# node_exporter_key_file: /etc/ssl/private/node-exporter.key

# Alertmanager ntfy integration — set URL to generate alertmanager.yml
alertmanager_ntfy_url: ""
