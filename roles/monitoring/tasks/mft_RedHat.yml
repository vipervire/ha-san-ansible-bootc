---
# roles/monitoring/tasks/mft_RedHat.yml — Mellanox MFT installation for Rocky/AlmaLinux

- name: Download Mellanox GPG signing key
  ansible.builtin.get_url:
    url: https://www.mellanox.com/downloads/ofed/RPM-GPG-KEY-Mellanox
    dest: /tmp/mellanox-gpg.asc
    mode: "0644"
  register: _mft_key_download

- name: Verify Mellanox GPG key fingerprint
  # Guards against CDN compromise or DNS hijack substituting a malicious key.
  # Fingerprint is pinned in group_vars/all.yml (mellanox_gpg_fingerprint).
  ansible.builtin.shell:
    cmd: >
      gpg --with-fingerprint --with-colons /tmp/mellanox-gpg.asc 2>/dev/null
      | grep -i "{{ mellanox_gpg_fingerprint }}"
  changed_when: false
  when: _mft_key_download is succeeded

- name: Install Mellanox GPG key to RPM key directory
  ansible.builtin.copy:
    src: /tmp/mellanox-gpg.asc
    dest: "{{ _mft_gpg_key_path }}"
    mode: "0644"
    remote_src: true
  when: _mft_key_download is changed

- name: Import Mellanox GPG key into RPM keyring
  ansible.builtin.command:
    cmd: "rpm --import {{ _mft_gpg_key_path }}"
  when: _mft_key_download is changed

- name: Remove temporary Mellanox GPG key file
  ansible.builtin.file:
    path: /tmp/mellanox-gpg.asc
    state: absent

- name: Add Mellanox MLNX_OFED RPM repository
  ansible.builtin.yum_repository:
    name: mellanox-mft
    description: Mellanox Firmware Tools (MLNX_OFED)
    baseurl: "{{ _mft_repo_baseurl }}"
    gpgcheck: true
    gpgkey: "file://{{ _mft_gpg_key_path }}"
    enabled: true
  when: _mft_key_download is succeeded

- name: Install Mellanox Firmware Tools packages
  ansible.builtin.dnf:
    name: "{{ _mft_packages }}"
    state: present

- name: Enable and start mst service
  ansible.builtin.systemd:
    name: mst
    state: started
    enabled: true
