---
# roles/hardening/tasks/main.yml — Security hardening for all nodes
# Dispatches to OS-specific task files for package installation,
# then runs shared tasks that are identical across both OSes.

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Load distribution-specific variable overrides
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true
  when: ansible_distribution != ansible_os_family

# ─── SSH Hardening ──────────────────────────────────────────────────────────
- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/90-hardening.conf
    mode: "0644"
  notify: restart sshd

# ─── Kernel Sysctl Hardening ───────────────────────────────────────────────
- name: Deploy security sysctl settings
  ansible.builtin.template:
    src: 90-hardening.conf.j2
    dest: /etc/sysctl.d/90-hardening.conf
    mode: "0644"
  notify: reload hardening sysctl

# ─── nftables Firewall ────────────────────────────────────────────────────
- name: Include OS-specific package installation tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      paths:
        - "{{ role_path }}/tasks"
  when: not (bootc_skip_packages | default(false))

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0755"
  notify: restart nftables

- name: Enable nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

# ─── PAM Account Lockout ──────────────────────────────────────────────────
- name: Deploy PAM faillock configuration
  ansible.builtin.template:
    src: faillock.conf.j2
    dest: /etc/security/faillock.conf
    mode: "0644"

- name: Enable PAM faillock module
  ansible.builtin.command: "{{ _pam_faillock_command }}"
  changed_when: false

# ─── Disable unnecessary services ─────────────────────────────────────────
- name: Disable IPv6 if not needed
  ansible.builtin.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

# ─── auditd ───────────────────────────────────────────────────────────────
- name: Install auditd
  ansible.builtin.package:
    name: "{{ _hardening_packages.auditd }}"
    state: present
  when:
    - auditd_enabled | default(false)
    - not (bootc_skip_packages | default(false))

- name: Deploy audit rules
  ansible.builtin.template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/99-ha-san.rules
    mode: "0640"
  when: auditd_enabled | default(false)
  notify: restart auditd

- name: Enable auditd service
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  when: auditd_enabled | default(false)

# ─── syslog forwarding ────────────────────────────────────────────────────
- name: Install rsyslog
  ansible.builtin.package:
    name: "{{ _hardening_packages.rsyslog }}"
    state: present
  when:
    - syslog_remote_enabled | default(false)
    - not (bootc_skip_packages | default(false))

- name: Deploy rsyslog remote forwarding config
  ansible.builtin.template:
    src: rsyslog-forward.conf.j2
    dest: /etc/rsyslog.d/90-remote.conf
    mode: "0644"
  when: syslog_remote_enabled | default(false)
  notify: restart rsyslog

# ─── hardware / software watchdog ─────────────────────────────────────────
- name: Persist watchdog kernel module across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/watchdog.conf
    content: "{{ watchdog_module }}\n"
    mode: "0644"
  when:
    - watchdog_enabled | default(false)
    - watchdog_module | default('') | length > 0

- name: Deploy watchdog kernel module options
  ansible.builtin.template:
    src: watchdog-modprobe.conf.j2
    dest: "/etc/modprobe.d/{{ watchdog_module }}.conf"
    mode: "0644"
  when:
    - watchdog_enabled | default(false)
    - watchdog_module | default('') | length > 0
    - watchdog_module_options | default({}) | length > 0
  notify: reload watchdog module

- name: Load watchdog kernel module
  ansible.builtin.command:
    cmd: "modprobe {{ watchdog_module }}"
  changed_when: false
  when:
    - watchdog_enabled | default(false)
    - watchdog_module | default('') | length > 0

- name: Install watchdog daemon
  ansible.builtin.package:
    name: "{{ _hardening_packages.watchdog }}"
    state: present
  when:
    - watchdog_enabled | default(false)
    - not (bootc_skip_packages | default(false))

- name: Deploy watchdog daemon configuration
  ansible.builtin.template:
    src: watchdog.conf.j2
    dest: /etc/watchdog.conf
    mode: "0644"
  when: watchdog_enabled | default(false)
  notify: restart watchdog

- name: Enable watchdog service
  ansible.builtin.systemd:
    name: watchdog
    enabled: true
    state: started
  when: watchdog_enabled | default(false)
