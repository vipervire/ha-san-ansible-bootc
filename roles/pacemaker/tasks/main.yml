---
# roles/pacemaker/tasks/main.yml — Pacemaker/Corosync cluster setup

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Load distribution-specific variable overrides
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true
  when: ansible_distribution != ansible_os_family

- name: Include OS-specific Pacemaker installation tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      paths:
        - "{{ role_path }}/tasks"
  when: not (bootc_skip_packages | default(false))

# ─── Shared Pacemaker configuration (OS-independent) ────────────────────────

- name: Set hacluster user password
  ansible.builtin.user:
    name: hacluster
    password: "{{ hacluster_password | password_hash('sha512') }}"
  no_log: true

- name: Enable pcsd service
  ansible.builtin.systemd:
    name: pcsd
    enabled: true
    state: started

- name: Back up corosync.conf before update
  ansible.builtin.copy:
    src: /etc/corosync/corosync.conf
    dest: /etc/corosync/corosync.conf.bak
    remote_src: true
    mode: "0644"
  failed_when: false

- name: Deploy corosync.conf
  ansible.builtin.template:
    src: corosync.conf.j2
    dest: /etc/corosync/corosync.conf
    mode: "0644"
  notify: restart corosync

- name: Enable Corosync and Pacemaker
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - corosync
    - pacemaker

# ─── Cluster initialization (run once from first storage node) ─────────────
- name: Authenticate cluster nodes
  ansible.builtin.command:
    cmd: >
      pcs host auth
      {% for node in corosync_nodes %}
      {{ node.name }} addr={{ hostvars[node.name].mgmt_ip }}
      {% endfor %}
      -u hacluster -p {{ hacluster_password }}
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"
  changed_when: false
  failed_when: false
  no_log: true

- name: Check if cluster exists
  ansible.builtin.command:
    cmd: pcs cluster status
  register: cluster_status
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"

- name: Create cluster (first time only)
  ansible.builtin.command:
    cmd: >
      pcs cluster setup {{ cluster_name }}
      {% for node in corosync_nodes %}
      {{ node.name }} addr={{ hostvars[node.name].mgmt_ip }}
      {% endfor %}
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"
  when: cluster_status.rc != 0

- name: Start cluster on all nodes
  ansible.builtin.command:
    cmd: pcs cluster start --all
  register: cluster_start
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"
  changed_when: false
  failed_when: >
    cluster_start.rc != 0 and
    'already' not in (cluster_start.stderr | lower) and
    'already' not in (cluster_start.stdout | lower)

- name: Enable cluster auto-start on all nodes
  ansible.builtin.command:
    cmd: pcs cluster enable --all
  register: cluster_enable
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"
  changed_when: false
  failed_when: >
    cluster_enable.rc != 0 and
    'already' not in (cluster_enable.stderr | lower) and
    'already' not in (cluster_enable.stdout | lower)

# ─── Cluster properties and STONITH (run once) ────────────────────────────
- name: Configure cluster properties
  ansible.builtin.command:
    cmd: "pcs property set {{ item }}"
  loop:
    - "stonith-enabled=true"
    - "no-quorum-policy=stop"
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"
  changed_when: false
  failed_when: false

- name: Set default resource stickiness
  ansible.builtin.command:
    cmd: pcs resource defaults update resource-stickiness={{ pacemaker_resource_stickiness }}
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"
  changed_when: false
  failed_when: false

- name: Generate Pacemaker resource configuration script
  ansible.builtin.template:
    src: configure-resources.sh.j2
    dest: /root/configure-pacemaker-resources.sh
    mode: "0700"
  when: inventory_hostname == pacemaker_preferred_node

- name: Generate post-deployment guide script
  ansible.builtin.template:
    src: post-deploy.sh.j2
    dest: /root/post-deploy.sh
    mode: "0700"
  when: inventory_hostname == pacemaker_preferred_node

# ─── Graceful standby on shutdown (storage nodes only) ────────────────────
- name: Deploy pacemaker-node-standby systemd service
  ansible.builtin.template:
    src: pacemaker-node-standby.service.j2
    dest: /etc/systemd/system/pacemaker-node-standby.service
    mode: "0644"
  when: inventory_hostname in groups['storage_nodes']
  notify: reload systemd

- name: Enable pacemaker-node-standby service
  ansible.builtin.systemd:
    name: pacemaker-node-standby.service
    enabled: true
    state: started
    daemon_reload: true
  when: inventory_hostname in groups['storage_nodes']

# ─── Corosync log rotation ─────────────────────────────────────────────────
- name: Deploy Corosync logrotate configuration
  ansible.builtin.template:
    src: corosync-logrotate.j2
    dest: /etc/logrotate.d/corosync
    mode: "0644"

# ─── Post-fence verification agent ─────────────────────────────────────────
- name: Deploy fence_check post-fence verification agent
  ansible.builtin.template:
    src: fence_check.j2
    dest: /usr/sbin/fence_check
    mode: "0755"
  when:
    - stonith_fence_verify | default(true)
    - inventory_hostname in groups['storage_nodes']

# ─── STONITH setup (delegated to preferred node) ─────────────────────────
- name: Generate STONITH configuration script
  ansible.builtin.template:
    src: configure-stonith.sh.j2
    dest: /root/configure-stonith.sh
    mode: "0700"
  when: inventory_hostname == pacemaker_preferred_node
  no_log: true
