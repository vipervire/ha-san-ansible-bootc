---
# roles/common/tasks/main.yml — Base OS setup for all nodes
# Dispatches to OS-specific task files for package management, then
# runs shared tasks that work identically on both Debian and Rocky.

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Load distribution-specific variable overrides
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true
  when: ansible_distribution != ansible_os_family

- name: Include OS-specific package tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      paths:
        - "{{ role_path }}/tasks"
  when: not (bootc_skip_packages | default(false))

# ─── Shared tasks (OS-independent) ──────────────────────────────────────────

- name: Configure chrony NTP
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ _chrony_config_path }}"
    mode: "0644"
  notify: restart chrony

- name: Ensure chrony is enabled
  ansible.builtin.systemd:
    name: "{{ _chrony_service_name }}"
    enabled: true
    state: started

- name: Build /etc/hosts with cluster nodes
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    mode: "0644"

- name: Mask ctrl-alt-del reboot target
  ansible.builtin.systemd:
    name: ctrl-alt-del.target
    masked: true
