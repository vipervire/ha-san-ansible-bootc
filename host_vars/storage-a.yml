---
# =============================================================================
# storage-a — Node-Specific Variables
# =============================================================================

# Network addresses per VLAN
storage_ip: "10.10.10.1"
mgmt_ip: "10.20.20.1"

# Per-VLAN client IPs — keyed by client_vlans[].name
client_ips:
  enduser: "10.30.30.1"
  hypervisor: "10.40.40.1"

# SSH listens only on management VLAN
ssh_listen_addresses:
  - "{{ mgmt_ip }}"

# iSCSI identity
iscsi_target_iqn: "{{ iscsi_iqn_prefix }}:storage-a"
iscsi_initiator_name: "{{ iscsi_iqn_prefix }}:initiator-a"

# Peer node (for iSCSI initiator to connect to)
iscsi_peer_ip: "10.10.10.2"
iscsi_peer_iqn: "{{ iscsi_iqn_prefix }}:storage-b"

# ---------------------------------------------------------------------------
# Local disks — MUST use persistent /dev/disk/by-id/ paths
# ---------------------------------------------------------------------------
# /dev/sdX paths are NOT stable — they reorder on reboot, drive replacement,
# or BIOS update and will cause pool creation to target wrong disks.
#
# To find by-id paths on this node:
#   ls -la /dev/disk/by-id/ | grep -v part | grep -v wwn
#   Use ata-*, scsi-*, or nvme-* identifiers (NOT wwn — those are hardware-specific)
#
# Example output:
#   ata-WDC_WD100EFAX-68LHPN0_XXXXXXXX -> ../../sda
#   ata-WDC_WD100EFAX-68LHPN0_YYYYYYYY -> ../../sdb
#
# Symmetric active/passive HA design:
# Each node exports its local disks via LIO iSCSI target AND connects to the peer's target.
# ZFS pool mirrors own local disks (physical) with peer's disks (iSCSI).
# Either node can be active primary. On failover, the surviving node imports the pool
# in degraded state (local disks only) and continues serving until the peer is restored.
# Pool re-silvering restores full redundancy once the peer reconnects.

local_data_disks:
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_0
    label: "data-a-0"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_1
    label: "data-a-1"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_2
    label: "data-a-2"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_3
    label: "data-a-3"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_4
    label: "data-a-4"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_5
    label: "data-a-5"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_6
    label: "data-a-6"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_7
    label: "data-a-7"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_8
    label: "data-a-8"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_9
    label: "data-a-9"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_10
    label: "data-a-10"
  - device: /dev/disk/by-id/ata-PLACEHOLDER_DISK_A_11
    label: "data-a-11"

# Optional: SLOG and special vdev disks (NVMe recommended for SLOG)
# SLOG accelerates sync writes (NFS sync, database commits) significantly.
# Uncomment and replace placeholders if you have dedicated NVMe devices.
# slog_disk:
#   device: /dev/disk/by-id/nvme-PLACEHOLDER_NVME_A
#   label: "slog-a"
# special_disk:
#   device: /dev/disk/by-id/nvme-PLACEHOLDER_SPECIAL_A
#   label: "special-a"

# ---------------------------------------------------------------------------
# Per-node watchdog overrides (optional)
# ---------------------------------------------------------------------------
# These override the global watchdog_* settings from group_vars/all.yml for
# this node only. Useful when storage-a and storage-b have different hardware
# (e.g. one has Intel TCO, the other only has softdog).
#
# See docs/watchdog.md for full module and option reference.
#
# Example — Intel TCO hardware watchdog:
# watchdog_enabled: true
# watchdog_module: iTCO_wdt
# watchdog_timeout: 60
# watchdog_interval: 10
#
# Example — IPMI/BMC watchdog:
# watchdog_enabled: true
# watchdog_module: ipmi_watchdog
# watchdog_module_options:
#   action: "reset"
#   timeout: "60"
#
# Example — AMD server board:
# watchdog_enabled: true
# watchdog_module: sp5100_tco
