---
# =============================================================================
# Storage Node Variables — STONITH fencing and Pacemaker configuration
# =============================================================================

# ---------------------------------------------------------------------------
# STONITH fencing — per-node configuration supporting mixed fencing methods
# ---------------------------------------------------------------------------
# Supported methods: ipmi, kasa, tasmota, esphome, http
# See docs/stonith-smart-plugs.md for setup guides per method.
#
# FENCING LATENCY vs. ZFS MULTIHOST:
#   On unplanned node failure, Pacemaker must successfully fence the dead node
#   before importing the ZFS pool on the survivor (multihost=on enforces this).
#   Typical fencing latency by method:
#     ipmi  — ~20-30s (IPMI BMC power cycle)
#     kasa  — ~5-15s  (smart plug local protocol)
#     http  — varies  (depends on device response time)
#   The ZFS resource start timeout (150s) accommodates these latencies.
#   If your fence agent is slower than expected, increase pcmk_reboot_timeout
#   in configure-stonith.sh and the zfs-pool start timeout in configure-resources.sh.

stonith_nodes:
  storage-a:
    method: "ipmi"           # Options: ipmi, kasa, tasmota, esphome, http
    ip: "10.20.20.101"       # BMC IP or smart plug IP
    user: "bmcadmin"         # IPMI user
    password: "CHANGEME-vault-this"  # IPMI password (vault this!)

  storage-b:
    method: "kasa"           # TP-Link Kasa smart plug
    ip: "10.20.20.202"       # Smart plug IP on management VLAN
    # No credentials needed for Kasa local protocol

# ───────────────────────────────────────────────────────────────────────────
# Example configurations for other methods:
# ───────────────────────────────────────────────────────────────────────────

# Example: Both nodes using IPMI
# stonith_nodes:
#   storage-a:
#     method: "ipmi"
#     ip: "10.20.20.101"
#     user: "admin"
#     password: "secret"
#   storage-b:
#     method: "ipmi"
#     ip: "10.20.20.102"
#     user: "admin"
#     password: "secret"

# Example: Both nodes using smart plugs
# stonith_nodes:
#   storage-a:
#     method: "kasa"
#     ip: "10.20.20.201"
#   storage-b:
#     method: "esphome"
#     ip: "10.20.20.202"
#     switch_name: "relay"
#     user: "admin"
#     password: "plugsecret"

# Example: Tasmota smart plug
# stonith_nodes:
#   storage-a:
#     method: "tasmota"
#     ip: "10.20.20.201"
#     user: "admin"          # optional
#     password: "secret"     # optional

# Example: Generic HTTP-controlled device
# stonith_nodes:
#   storage-a:
#     method: "http"
#     ip: "10.20.20.201"
#     user: "admin"
#     password: "secret"
#     power_off_url: "/api/power/off"
#     power_on_url: "/api/power/on"
#     status_url: "/api/status"
#     status_on_regex: "powered.*on"
#     status_off_regex: "powered.*off"

# ---------------------------------------------------------------------------
# Pacemaker resource configuration
# ---------------------------------------------------------------------------
pacemaker_preferred_node: "storage-a"  # soft preference, not hard pin
pacemaker_resource_stickiness: 200
# Seconds to wait after 'pcs node standby' during shutdown for resources to migrate
# before pacemaker itself stops. Planned migration takes ~5-8s; 15s is conservative.
pacemaker_standby_drain_seconds: 15

# ---------------------------------------------------------------------------
# Monitoring — storage node exporter flags
# ---------------------------------------------------------------------------
# S.M.A.R.T disk health monitoring (strongly recommended for storage nodes)
smart_monitoring_enabled: true

# ZFS scrub metrics (textfile exporter via node_exporter)
zfs_scrub_monitoring_enabled: true

# Hardware memory error tracking via rasdaemon (opt-in, requires ECC RAM)
ras_monitoring_enabled: false
