---
# =============================================================================
# HA ZFS-over-iSCSI SAN — Global Variables
# =============================================================================
# These variables are shared across ALL nodes (storage + quorum).
# Override per-group in group_vars/storage_nodes/ or per-host in host_vars/.

# ---------------------------------------------------------------------------
# Cluster identity
# ---------------------------------------------------------------------------
cluster_name: san-cluster
hacluster_password: "CHANGEME-use-ansible-vault"  # vault this in production

# ---------------------------------------------------------------------------
# Network — VLANs & Subnets
# ---------------------------------------------------------------------------
# Adjust VLAN IDs, subnets, and interface names to match your hardware.
# The playbook uses these to build configs; it does NOT configure switch ports.

vlans:
  storage:
    id: 10
    subnet: "10.10.10.0/24"
    mtu: 9000
    description: "iSCSI replication between storage nodes"
  management:
    id: 20
    subnet: "10.20.20.0/24"
    mtu: 1500
    description: "Corosync, Pacemaker, SSH, IPMI"

# ---------------------------------------------------------------------------
# Client VLANs — one or more VLANs serving storage to clients
# ---------------------------------------------------------------------------
# Each entry creates a floating VIP and per-VLAN firewall rules.
# Services: nfs, smb, iscsi, ssh (ssh enables Proxmox ZFS-over-iSCSI access)
# parent_interface is optional — defaults to net_client_parent from network.yml
client_vlans:
  - name: enduser
    id: 30
    subnet: "10.30.30.0/24"
    mtu: 9000
    # parent_interface: "ens3f1"  # optional, defaults to net_client_parent
    vip: "10.30.30.10"
    vip_cidr: 24
    services: [nfs, smb]
    description: "End-user NFS/SMB"
  - name: hypervisor
    id: 40
    subnet: "10.40.40.0/24"
    mtu: 9000
    vip: "10.40.40.10"
    vip_cidr: 24
    services: [iscsi, ssh]
    description: "Hypervisor iSCSI"
    # Per-VLAN iSCSI ACLs — required when multiple VLANs use iSCSI service.
    # When only one VLAN has iSCSI, falls back to iscsi_client_acls in iscsi.yml.
    # Entries can be plain IQN strings (ACL-only, no CHAP) or dicts with per-initiator CHAP:
    #   Plain string:  "iqn.2025-01.lab.home:proxmox-a"
    #   Dict with CHAP: {iqn: "...", chap_user: "proxmox-a", chap_password: !vault |...}
    # CHAP is implicit: present credentials = CHAP on; no credentials = CHAP off.
    iscsi_acls:
      - "{{ iscsi_iqn_prefix }}:proxmox-a"
      - "{{ iscsi_iqn_prefix }}:proxmox-b"
    # Example with per-initiator CHAP (vault-encrypt chap_password in production):
    # iscsi_acls:
    #   - iqn: "{{ iscsi_iqn_prefix }}:proxmox-a"
    #     chap_user: "proxmox-a"
    #     chap_password: !vault |
    #       $ANSIBLE_VAULT;1.1;AES256
    #       ...
    #   - iqn: "{{ iscsi_iqn_prefix }}:proxmox-b"
    #     chap_user: "proxmox-b"
    #     chap_password: !vault |
    #       $ANSIBLE_VAULT;1.1;AES256
    #       ...
    # Per-VLAN zvol dataset — required when multiple VLANs use iSCSI service.
    # When only one VLAN has iSCSI, falls back to iscsi_client_zvol_dataset (default: "iscsi").
    # Sub-datasets must be created in zfs_datasets (see group_vars/storage_nodes/zfs.yml).
    iscsi_dataset: "iscsi/hypervisor"
    # generate_node_acls: true  — allow any initiator (required for Proxmox ZFS-over-iSCSI plugin).
    # Sets generate_node_acls=1 + demo_mode_write_protect=0 on this VLAN's TPG.
    # When true, iscsi_acls is not required. Optional per-TPG CHAP (shared by all initiators):
    #   iscsi_chap_user: "proxmox-tpg"
    #   iscsi_chap_password: !vault |
    #     $ANSIBLE_VAULT;1.1;AES256
    #     ...

# Management VIP for Cockpit (on management VLAN)
vip_cockpit: "10.20.20.10"
vip_mgmt_cidr: 24

# ---------------------------------------------------------------------------
# Corosync — Aggressive-Safe Tuning
# ---------------------------------------------------------------------------
corosync_token: 4000        # 4s to declare node dead (don't go below 3000)
corosync_consensus: 4800    # 1.2× token
corosync_join: 1000
corosync_max_messages: 20
corosync_transport: knet
corosync_crypto_cipher: aes256
corosync_crypto_hash: sha256

# Node definitions for corosync.conf
# Ring addresses are derived automatically from host_vars:
#   ring0_addr ← hostvars[name].mgmt_ip    (management VLAN, present on all nodes)
#   ring1_addr ← hostvars[name].storage_ip (storage VLAN, only on storage nodes)
# To change a node's ring address, update mgmt_ip/storage_ip in host_vars/<node>.yml.
corosync_nodes:
  - name: storage-a
    nodeid: 1
  - name: storage-b
    nodeid: 2
  - name: quorum
    nodeid: 3

# ---------------------------------------------------------------------------
# NTP
# ---------------------------------------------------------------------------
# Set explicit NTP servers here, or leave empty to use OS-specific defaults:
#   Debian: 0.debian.pool.ntp.org, 1.debian.pool.ntp.org
#   Rocky:  0.pool.ntp.org, 1.pool.ntp.org
ntp_servers: []

# ---------------------------------------------------------------------------
# Monitoring — Cluster metrics (Pacemaker/Corosync)
# ---------------------------------------------------------------------------
ha_cluster_monitoring_enabled: true        # Enable/disable cluster monitoring
ha_cluster_exporter_port: 9664             # Standard port for ha_cluster_exporter
ha_cluster_exporter_address: "{{ mgmt_ip | default('0.0.0.0') }}"  # Listen on mgmt VLAN

# ---------------------------------------------------------------------------
# SSH hardening
# ---------------------------------------------------------------------------
ssh_listen_addresses: []  # override per-host; empty = all interfaces
ssh_allowed_users:
  - storageadmin
ssh_port: 22

# ---------------------------------------------------------------------------
# Admin user
# ---------------------------------------------------------------------------
admin_user: storageadmin
# Place your public key here or load from file
admin_ssh_pubkey: "ssh-ed25519 AAAA... your-key-here"

# ---------------------------------------------------------------------------
# Security — optional hardening features
# ---------------------------------------------------------------------------
# auditd — monitors sensitive config files and privilege escalation
auditd_enabled: false

# Remote syslog forwarding (rsyslog)
syslog_remote_enabled: false
# syslog_remote_host: "10.20.20.100"
# syslog_remote_port: 514
# syslog_remote_protocol: "udp"   # or "tcp"

# Hardware / software watchdog — reboots node if OS hangs
# The watchdog daemon pets /dev/watchdog every `watchdog_interval` seconds.
# If it stops (OS hang, kernel panic), the hardware or softdog timer expires
# and forces a reset — complementing STONITH with self-fencing.
#
# Kernel modules:
#   softdog         — software watchdog, available on all x86 systems (default)
#   iTCO_wdt        — Intel TCO hardware watchdog (most Intel server boards)
#   ipmi_watchdog   — IPMI BMC watchdog (requires IPMI/BMC)
#   sp5100_tco      — AMD server board watchdog
#   mpc8xxx_wdt     — Freescale/NXP PowerPC (rare in this context)
#
# For softdog, the kernel timeout is set by the soft_margin module parameter
# (default 60s). Set watchdog_module_options: {soft_margin: "60"} to match
# watchdog_timeout if you change it.
#
# Per-node overrides: any of these variables can be set in host_vars/<node>.yml
# to use a different watchdog module or settings on each node independently.
# For example, storage-a may have iTCO_wdt while storage-b uses softdog.
# See host_vars/storage-{a,b}.yml for commented examples and docs/watchdog.md.
watchdog_enabled: false
# watchdog_module: "softdog"          # kernel module to load; creates /dev/watchdog
# watchdog_module_options: {}         # modprobe options, e.g. {soft_margin: "60", nowayout: "0"}
# watchdog_device: "/dev/watchdog"
# watchdog_timeout: 60
# watchdog_interval: 10
# watchdog_max_load: 24.0
# watchdog_min_memory: 1

# ---------------------------------------------------------------------------
# 45Drives Houston Cockpit plugins — GPG key fingerprint
# ---------------------------------------------------------------------------
# Pinned fingerprint of the 45Drives package signing key (repo@45drives.com).
# The cockpit role verifies the downloaded key matches this fingerprint before
# adding the repository, guarding against CDN compromise or DNS hijack.
# Verify out-of-band: gpg --with-fingerprint --with-colons /tmp/45drives-gpg.asc
fortyfive_drives_gpg_fingerprint: "3FBD7E034E80BAF63D5AA9BB98899BBC7318C72B"

# ---------------------------------------------------------------------------
# Mellanox MFT — GPG key fingerprint
# ---------------------------------------------------------------------------
# Pinned fingerprint of the Mellanox package signing key.
# Used by the monitoring role when mellanox_mft_install: true.
# Verify out-of-band: gpg --with-fingerprint --with-colons /tmp/mellanox-gpg.asc
mellanox_gpg_fingerprint: "A9E5 1B76 B89A D4D5 8FAF  1CB4 A80A 7645 41C7 B1D0"

# Rate limiting for Cockpit (9090) and pcsd (2224) — brute-force protection
firewall_rate_limit_enabled: true

# NFSv3 ports in firewall (111/tcp+udp, 20048) — only needed if nfs_v3_enabled: true
# (mirrored from services role; set both consistently)
nfs_v3_enabled: false
