# Example Prometheus Alert Rules for ZFS Scrub Monitoring
#
# Add this file to your Prometheus server configuration:
# 1. Copy to your Prometheus rules directory (e.g., /etc/prometheus/rules/)
# 2. Add to prometheus.yml:
#    rule_files:
#      - "rules/prometheus-alerts.yml"
# 3. Reload Prometheus: systemctl reload prometheus

groups:
  - name: zfs_scrub_alerts
    interval: 5m
    rules:
      # Alert if no scrub has run in over 35 days
      - alert: ZFSScrubOverdue
        expr: |
          (time() - zfs_scrub_last_run_timestamp_seconds{pool="san-pool"} > 35 * 86400)
          and zfs_scrub_pool_imported{pool="san-pool"} == 1
        for: 1h
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "ZFS scrub overdue on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} has not been scrubbed in over 35 days.
            Last scrub: {{ $value | humanizeDuration }} ago.
            Monthly scrubs are recommended for data integrity verification.

      # Alert if scrub has never run (and pool is imported)
      - alert: ZFSScrubNeverRun
        expr: |
          zfs_scrub_last_run_timestamp_seconds{pool="san-pool"} == 0
          and zfs_scrub_pool_imported{pool="san-pool"} == 1
        for: 24h
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "ZFS scrub has never run on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} has never been scrubbed.
            Consider running a manual scrub: systemctl start zfs-scrub@san-pool.service

      # Alert if last scrub found errors
      - alert: ZFSScrubErrors
        expr: zfs_scrub_last_run_errors_total{pool="san-pool"} > 0
        for: 5m
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "ZFS scrub found errors on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} found {{ $value }} errors during last scrub.
            Data corruption detected! Investigate immediately with: zpool status -v {{ $labels.pool }}

      # Alert if pool is degraded
      - alert: ZFSPoolDegraded
        expr: zfs_scrub_pool_health{pool="san-pool"} >= 1
        for: 5m
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "ZFS pool degraded on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} is in {{ $labels.state }} state.
            Check pool status: zpool status {{ $labels.pool }}
            Scrubs are automatically skipped while pool is degraded.

      # Alert if metrics exporter fails
      - alert: ZFSScrubExporterFailed
        expr: zfs_scrub_exporter_success == 0
        for: 15m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "ZFS scrub metrics exporter failing on {{ $labels.instance }}"
          description: |
            The ZFS scrub metrics exporter on {{ $labels.instance }} is not producing valid metrics.
            Check logs: journalctl -u zfs-scrub-exporter.service

      # Alert if scrub has been running for unusually long (>12 hours)
      - alert: ZFSScrubStalled
        expr: zfs_scrub_in_progress{pool="san-pool"} == 1
        for: 12h
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "ZFS scrub running for over 12 hours on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} has been scrubbing for over 12 hours.
            This is unusual for SSD-based pools. Check if scrub is making progress:
            watch zpool status {{ $labels.pool }}

      # Alert if both nodes think they have the pool imported (split-brain warning)
      - alert: ZFSPoolSplitBrain
        expr: sum(zfs_scrub_pool_imported{pool="san-pool"}) > 1
        for: 1m
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "ZFS pool imported on multiple nodes simultaneously"
          description: |
            Pool san-pool is imported on {{ $value }} nodes. This should never happen!
            Possible Pacemaker failure or multihost protection bypass.
            Investigate immediately to prevent data corruption.
          runbook: "See docs/alert-runbooks.md#zfspoolsplitbrain"

      # Alert if Sanoid snapshots are overdue (requires Phase 15 exporter metric)
      - alert: SanoidSnapshotOverdue
        expr: |
          (time() - zfs_dataset_last_snapshot_seconds) > 90000
          and zfs_scrub_pool_imported{pool="san-pool"} == 1
        for: 1h
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "ZFS dataset snapshot overdue on {{ $labels.instance }}"
          description: |
            Dataset {{ $labels.dataset }} on {{ $labels.instance }} has not had a snapshot
            in over 25 hours. Sanoid may not be running.
            Check: systemctl status sanoid.timer
            Manual snapshot: sanoid --take-snapshots --verbose
          runbook: "See docs/alert-runbooks.md#sanoidsnapshotoverdue"

  # =========================================================================
  # Pacemaker/Corosync Cluster Health Alerts
  # =========================================================================
  - name: ha_cluster_alerts
    interval: 30s
    rules:
      # ─── Quorum and Cluster Health ─────────────────────────────────
      - alert: ClusterQuorumLost
        expr: ha_cluster_corosync_quorate == 0
        for: 30s
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Cluster quorum lost"
          description: |
            Cluster {{ $labels.cluster }} has lost quorum.
            Cluster resources will be stopped to prevent split-brain.
            Check node status: pcs status

      - alert: ClusterNodeOffline
        expr: ha_cluster_pacemaker_nodes{type="member",status="offline"} == 1
        for: 2m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Cluster node {{ $labels.node }} is offline"
          description: |
            Node {{ $labels.node }} in cluster {{ $labels.cluster }} is offline.
            Check node connectivity and cluster status: pcs status

      # ─── Resource Health ────────────────────────────────────────────
      - alert: ClusterResourceFailed
        expr: ha_cluster_pacemaker_fail_count > 0
        for: 1m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Resource {{ $labels.resource }} failing on {{ $labels.node }}"
          description: |
            Resource {{ $labels.resource }} has {{ $value }} failures on node {{ $labels.node }}.
            Check resource status: pcs status
            Check logs: journalctl -u pacemaker -f

      - alert: ClusterResourceStopped
        expr: ha_cluster_pacemaker_resources{status="stopped",managed="true"} == 1
        for: 5m
        labels:
          severity: warning
          component: cluster
        annotations:
          summary: "Managed resource {{ $labels.resource }} is stopped"
          description: |
            Resource {{ $labels.resource }} is stopped but should be managed.
            This may indicate a failover or resource issue.
            Check status: pcs resource status {{ $labels.resource }}

      # ─── STONITH / Fencing ──────────────────────────────────────────
      - alert: StonithDisabled
        expr: ha_cluster_pacemaker_stonith_enabled == 0
        for: 10m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "STONITH is disabled in cluster"
          description: |
            STONITH (fencing) is disabled in cluster {{ $labels.cluster }}.
            This is unsafe for production - split-brain can cause data corruption.
            Enable STONITH: pcs property set stonith-enabled=true

      # ─── Corosync Ring Health ───────────────────────────────────────
      - alert: CorosyncRingFaulty
        expr: ha_cluster_corosync_ring_errors > 0
        for: 2m
        labels:
          severity: warning
          component: cluster
        annotations:
          summary: "Corosync ring errors on {{ $labels.node }}"
          description: |
            Corosync ring {{ $labels.ring_id }} on {{ $labels.node }} has errors.
            Check ring status: corosync-cfgtool -s
            Check network connectivity on management VLAN

      - alert: CorosyncMembershipChanges
        expr: rate(ha_cluster_corosync_member_votes[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: cluster
        annotations:
          summary: "Frequent cluster membership changes detected"
          description: |
            Cluster {{ $labels.cluster }} is experiencing frequent membership changes.
            This may indicate network instability or node issues.
            Check: corosync-quorumtool and pcs status

      # ─── Failover Detection ─────────────────────────────────────────
      - alert: ResourceFailoverDetected
        expr: changes(ha_cluster_pacemaker_location_constraints[5m]) > 0
        for: 1m
        labels:
          severity: info
          component: cluster
        annotations:
          summary: "Resource failover detected in cluster"
          description: |
            Resource location constraints have changed in the last 5 minutes.
            This may indicate a planned or unplanned failover.
            Cluster: {{ $labels.cluster }}
            Check: pcs status

      # ─── Resource Constraints ────────────────────────────────────────
      - alert: ResourceMigrationThresholdReached
        expr: ha_cluster_pacemaker_fail_count >= ha_cluster_pacemaker_migration_threshold
        for: 30s
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Resource {{ $labels.resource }} reached migration threshold"
          description: |
            Resource {{ $labels.resource }} on node {{ $labels.node }} has reached its migration threshold.
            The resource will be migrated to another node.
            Failures: {{ $value }}
            Check: pcs resource failcount show {{ $labels.resource }}

      # ─── Split-Brain Prevention ──────────────────────────────────────
      - alert: ClusterSplitBrainRisk
        expr: count(ha_cluster_corosync_quorate == 1) > 1
        for: 30s
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Multiple nodes reporting quorum - split-brain risk!"
          description: |
            Multiple cluster nodes are simultaneously reporting quorum.
            This is a split-brain condition - IMMEDIATE ATTENTION REQUIRED.
            {{ $value }} nodes reporting quorum.
            Manually verify cluster state on all nodes: pcs status

      # ─── Stuck Resource Transitions ─────────────────────────────────
      - alert: PacemakerResourceTransitionStuck
        expr: ha_cluster_pacemaker_resources{managed="true",status=~"starting|stopping"} == 1
        for: 10m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Pacemaker resource {{ $labels.resource }} stuck in {{ $labels.status }}"
          description: |
            Resource {{ $labels.resource }} has been in {{ $labels.status }} state for over 10 minutes.
            This may indicate a hung agent or fence failure.
            Check: pcs status
            Check logs: journalctl -u pacemaker -f
          runbook: "See docs/alert-runbooks.md#pacemakerresourcetransitionstuck"

      # ─── Exporter Health ──────────────────────────────────────────────
      - alert: HAClusterExporterDown
        expr: up{job="ha_cluster"} == 0
        for: 3m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "HA cluster exporter down on {{ $labels.instance }}"
          description: |
            The ha_cluster_exporter on {{ $labels.instance }} is not responding.
            Check service: systemctl status prometheus-hacluster-exporter
            Check logs: journalctl -u prometheus-hacluster-exporter

  # =========================================================================
  # ZFS Pool Capacity and Vdev Alerts
  # =========================================================================
  - name: zfs_capacity_alerts
    interval: 5m
    rules:
      - alert: ZFSPoolCapacityCritical
        expr: |
          zfs_pool_free_bytes / zfs_pool_size_bytes < 0.10
          and zfs_scrub_pool_imported == 1
        for: 5m
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "ZFS pool {{ $labels.pool }} critically low on space"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} is over 90% full.
            Free space: {{ $value | humanizePercentage }} remaining.
            Add capacity or delete data immediately.
          runbook: "See docs/alert-runbooks.md#zfspoolcapacitycritical"

      - alert: ZFSPoolCapacityWarning
        expr: |
          zfs_pool_free_bytes / zfs_pool_size_bytes < 0.20
          and zfs_scrub_pool_imported == 1
        for: 15m
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "ZFS pool {{ $labels.pool }} low on space"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} is over 80% full.
            Free space: {{ $value | humanizePercentage }} remaining.
            Plan capacity expansion.
          runbook: "See docs/alert-runbooks.md#zfspoolcapacitywarning"

      - alert: ZFSVdevErrors
        expr: |
          (zfs_vdev_read_errors + zfs_vdev_write_errors + zfs_vdev_cksum_errors) > 0
          and zfs_scrub_pool_imported == 1
        for: 5m
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "ZFS vdev {{ $labels.vdev }} has errors"
          description: |
            Vdev {{ $labels.vdev }} in pool {{ $labels.pool }} on {{ $labels.instance }}
            has I/O or checksum errors. Possible disk failure.
            Check: zpool status -v {{ $labels.pool }}
          runbook: "See docs/alert-runbooks.md#zfsvdeverrors"

      - alert: ZFSResilverInProgress
        expr: zfs_resilver_in_progress == 1
        for: 1h
        labels:
          severity: info
          component: storage
        annotations:
          summary: "ZFS resilver in progress on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} is resilvering.
            Progress: {{ with query (printf "zfs_resilver_percent_complete{pool=\"%s\",instance=\"%s\"}" $labels.pool $labels.instance) }}{{ . | first | value }}{{ end }}%
            Monitor: watch zpool status {{ $labels.pool }}
          runbook: "See docs/alert-runbooks.md#zfsresilverinprogress"

      - alert: ZFSResilverStalled
        expr: zfs_resilver_in_progress == 1
        for: 4h
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "ZFS resilver stalled on {{ $labels.instance }}"
          description: |
            Pool {{ $labels.pool }} on {{ $labels.instance }} has been resilvering for over 4 hours.
            Check if resilver is making progress: zpool status {{ $labels.pool }}
            Check for failing vdevs that may be preventing completion.
          runbook: "See docs/alert-runbooks.md#zfsresilverstalleg"

  # =========================================================================
  # STONITH / Fencing Probe Alerts
  # =========================================================================
  - name: stonith_alerts
    interval: 2m
    rules:
      - alert: STONITHAgentUnreachable
        expr: stonith_agent_reachable == 0
        for: 2m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "STONITH fence agent {{ $labels.agent }} unreachable"
          description: |
            Fence agent {{ $labels.agent }} (method: {{ $labels.method }}) for target {{ $labels.target }}
            is not responding to pings.
            If fencing is needed and agent is unreachable, the cluster CANNOT safely fence the node.
            Check device at IP in stonith_nodes config.
          runbook: "See docs/alert-runbooks.md#stonithagentunreachable"

      - alert: STONITHResourceFailed
        expr: ha_cluster_pacemaker_resources{resource=~"fence-.*",status="failed"} == 1
        for: 1m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "STONITH resource {{ $labels.resource }} has failed"
          description: |
            STONITH resource {{ $labels.resource }} is in failed state.
            The cluster cannot fence node {{ $labels.resource | reReplaceAll "fence-" "" }}.
            Clear failures: pcs resource cleanup {{ $labels.resource }}
            Check config: pcs stonith show {{ $labels.resource }}
          runbook: "See docs/alert-runbooks.md#stonithresourcefailed"

      - alert: STONITHFenceVerifyFailed
        expr: ha_cluster_pacemaker_resources{resource=~"fence-verify-.*",status="failed"} == 1
        for: 1m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "Post-fence verification failed for {{ $labels.resource }}"
          description: |
            The fence verification agent {{ $labels.resource }} failed.
            This means the STONITH device reported power ON, or the target node is
            still reachable on the network after fencing was attempted.
            Pacemaker has BLOCKED failover to prevent split-brain / data corruption.
            Manual investigation required:
              - Check device outlet assignment (wrong outlet?)
              - Check if a UPS is keeping the node alive
              - Query device: fence_check -o status -n <node>
              - Check pacemaker logs: journalctl -u pacemaker -f
            DO NOT manually clear this failure until the node is confirmed dead.
          runbook: "See docs/stonith-smart-plugs.md#post-fence-verification"

  # =========================================================================
  # Service Health Alerts
  # =========================================================================
  - name: service_health_alerts
    interval: 1m
    rules:
      - alert: NFSServerDown
        expr: |
          ha_cluster_pacemaker_resources{resource="nfs-server",status="stopped",managed="true"} == 1
        for: 2m
        labels:
          severity: critical
          component: services
        annotations:
          summary: "NFS server resource is stopped"
          description: |
            The nfs-server Pacemaker resource is stopped but should be managed.
            NFS clients will be unable to mount shares.
            Check: pcs resource status nfs-server
            Logs: journalctl -u nfs-kernel-server
          runbook: "See docs/alert-runbooks.md#nfsserverdown"

      - alert: SMBServerDown
        expr: |
          ha_cluster_pacemaker_resources{resource="smb-server",status="stopped",managed="true"} == 1
        for: 2m
        labels:
          severity: critical
          component: services
        annotations:
          summary: "SMB server resource is stopped"
          description: |
            The smb-server Pacemaker resource is stopped but should be managed.
            SMB/CIFS clients will be unable to connect.
            Check: pcs resource status smb-server
            Logs: journalctl -u smbd
          runbook: "See docs/alert-runbooks.md#smbserverdown"

  # =========================================================================
  # Node Health Alerts
  # =========================================================================
  - name: node_health_alerts
    interval: 15m
    rules:
      - alert: NodeRebootRequired
        expr: node_reboot_required == 1
        for: 1h
        labels:
          severity: warning
          component: os
        annotations:
          summary: "Node {{ $labels.instance }} requires a reboot"
          description: |
            Node {{ $labels.instance }} has pending updates that require a reboot.
            Schedule maintenance: pcs node standby <node>
            Reboot, then: pcs node unstandby <node>
          runbook: "See docs/alert-runbooks.md#noderebootrequired"

      - alert: NodeMemoryHigh
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.90
        for: 10m
        labels:
          severity: warning
          component: os
        annotations:
          summary: "Node {{ $labels.instance }} memory usage is high"
          description: |
            Node {{ $labels.instance }} is using over 90% of available memory.
            Current usage: {{ $value | humanizePercentage }}.
            Check ZFS ARC usage: arc_summary
            Check processes: ps aux --sort=-%mem | head -20
          runbook: "See docs/alert-runbooks.md#nodememoryhigh"

  # =========================================================================
  # Alertmanager Pipeline Watchdog
  # =========================================================================
  - name: watchdog
    rules:
      # This alert always fires, confirming the alerting pipeline is functional.
      # Route to Uptime Kuma push endpoint in Alertmanager — if it stops firing,
      # the pipeline (Prometheus → Alertmanager → ntfy) is broken.
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
          component: monitoring
        annotations:
          summary: "Alerting pipeline watchdog"
          description: |
            This alert always fires to confirm the alerting pipeline is working end-to-end.
            If this stops arriving at Uptime Kuma, the Prometheus → Alertmanager → delivery
            pipeline has a break.

  - name: disk_health
    rules:
      - alert: DiskSMARTUnhealthy
        expr: node_disk_smart_healthy == 0
        for: 5m
        labels:
          severity: critical
          component: storage
        annotations:
          summary: "SMART failure on {{ $labels.instance }} device {{ $labels.device }}"
          description: |
            Disk {{ $labels.device }} (serial: {{ $labels.serial }}) reports SMART failure.
            Immediate replacement required. Check: smartctl -H /dev/{{ $labels.device }}

      - alert: DiskReallocatedSectors
        expr: node_disk_smart_reallocated_sectors_total > 0
        for: 5m
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "Reallocated sectors on {{ $labels.instance }} device {{ $labels.device }}"
          description: |
            Disk {{ $labels.device }} (serial: {{ $labels.serial }}) has {{ $value }} reallocated sectors.
            Drive may be failing — monitor closely and consider replacement.

      - alert: DiskTemperatureHigh
        expr: node_disk_smart_temperature_celsius > 55
        for: 15m
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "High disk temperature on {{ $labels.instance }} device {{ $labels.device }}"
          description: "Drive {{ $labels.device }} temperature is {{ $value }}°C. Check airflow/cooling."

      - alert: NVMeWearCritical
        expr: node_disk_nvme_percentage_used > 90
        for: 15m
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "NVMe wear level critical on {{ $labels.instance }} device {{ $labels.device }}"
          description: "NVMe {{ $labels.device }} (serial: {{ $labels.serial }}) is {{ $value }}% worn."

      - alert: NVMeAvailableSparelow
        expr: node_disk_nvme_available_spare_percent < 20
        for: 15m
        labels:
          severity: warning
          component: storage
        annotations:
          summary: "NVMe low spare capacity on {{ $labels.instance }} device {{ $labels.device }}"
          description: "NVMe {{ $labels.device }} available spare is {{ $value }}%."

  - name: memory_health
    rules:
      - alert: MemoryECCUncorrectable
        expr: node_memory_uncorrectable_errors_total > 0
        for: 5m
        labels:
          severity: critical
          component: hardware
        annotations:
          summary: "Uncorrectable ECC memory errors on {{ $labels.instance }}"
          description: |
            {{ $value }} uncorrectable memory errors detected on {{ $labels.instance }}.
            Risk of data corruption — investigate DIMM health immediately.

      - alert: MemoryECCCorrectableHigh
        expr: increase(node_memory_correctable_errors_total[1h]) > 10
        for: 15m
        labels:
          severity: warning
          component: hardware
        annotations:
          summary: "High rate of correctable ECC errors on {{ $labels.instance }}"
          description: |
            {{ $value }} correctable ECC errors in the past hour on {{ $labels.instance }}.
            Correctable errors indicate degrading DIMM — schedule replacement.

  # =========================================================================
  # NIC / HBA / SFP Temperature Alerts
  # =========================================================================
  - name: hwtemp_alerts
    interval: 5m
    rules:
      - alert: NICTemperatureHigh
        expr: node_nic_temperature_celsius > 80
        for: 10m
        labels:
          severity: warning
          component: hardware
        annotations:
          summary: "NIC temperature high on {{ $labels.instance }}"
          description: |
            NIC {{ $labels.interface }} sensor {{ $labels.sensor }} on {{ $labels.instance }}
            is {{ $value }}°C — above 80°C warning threshold.
            Check chassis airflow and NIC heatsink/fan.

      - alert: NICTemperatureCritical
        expr: node_nic_temperature_celsius > 95
        for: 5m
        labels:
          severity: critical
          component: hardware
        annotations:
          summary: "NIC temperature critical on {{ $labels.instance }}"
          description: |
            NIC {{ $labels.interface }} sensor {{ $labels.sensor }} on {{ $labels.instance }}
            is {{ $value }}°C — above 95°C critical threshold.
            Risk of hardware damage or thermal shutdown. Check cooling immediately.

      - alert: SFPTemperatureHigh
        expr: node_nic_sfp_temperature_celsius > 70
        for: 10m
        labels:
          severity: warning
          component: hardware
        annotations:
          summary: "SFP transceiver temperature high on {{ $labels.instance }}"
          description: |
            SFP/QSFP transceiver on {{ $labels.interface }} at {{ $labels.instance }}
            is {{ $value }}°C — above 70°C warning threshold.
            Check transceiver compatibility, cable bend radius, and cage airflow.

      - alert: HBATemperatureHigh
        expr: node_hba_temperature_celsius > 80
        for: 10m
        labels:
          severity: warning
          component: hardware
        annotations:
          summary: "HBA temperature high on {{ $labels.instance }}"
          description: |
            HBA {{ $labels.host }} (driver: {{ $labels.driver }}, pci: {{ $labels.pci_slot }})
            on {{ $labels.instance }} is {{ $value }}°C — above 80°C warning threshold.
            Check chassis airflow and HBA heatsink.

      - alert: HWTempExporterFailed
        expr: node_hwtemp_exporter_success == 0
        for: 15m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "HW temperature exporter failing on {{ $labels.instance }}"
          description: |
            The hwtemp-exporter on {{ $labels.instance }} is not producing valid metrics.
            Check logs: journalctl -u hwtemp-exporter.service

  - name: time_sync
    rules:
      - alert: ClockDrift
        expr: abs(node_timex_offset_seconds) > 0.1
        for: 5m
        labels:
          severity: warning
          component: cluster
        annotations:
          summary: "Clock drift on {{ $labels.instance }}"
          description: |
            NTP offset is {{ $value | humanizeDuration }} on {{ $labels.instance }}.
            Corosync may misbehave if drift exceeds safe bounds (token timeout: 4000ms).
            Check: chronyc tracking

      - alert: NTPNotSynchronized
        expr: node_timex_sync_status != 1
        for: 5m
        labels:
          severity: critical
          component: cluster
        annotations:
          summary: "NTP not synchronized on {{ $labels.instance }}"
          description: |
            NTP is not synchronized on {{ $labels.instance }}.
            Corosync cluster membership depends on synchronized clocks.
            Check: systemctl status chronyd && chronyc sources

  # =========================================================================
  # Alertmanager Inhibit Rules (add to alertmanager.yml)
  # =========================================================================
  #
  # inhibit_rules:
  #   # Suppress warnings when a critical alert fires for the same resource
  #   - source_match: { severity: 'critical' }
  #     target_match: { severity: 'warning' }
  #     equal: ['alertname', 'instance']
