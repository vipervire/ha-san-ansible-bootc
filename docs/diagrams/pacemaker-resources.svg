<svg viewBox="0 0 1050 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:1050px;display:block;margin:0 auto;">
  <!-- Corosync ring -->
  <ellipse cx="525" cy="80" rx="300" ry="50" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="525" y="20" fill="#a78bfa" font-size="12" text-anchor="middle" font-weight="600">Corosync Cluster Ring (3 nodes, quorum = 2)</text>

  <!-- Nodes on the ring -->
  <circle cx="225" cy="80" r="30" fill="#2dd4a022" stroke="#2dd4a0" stroke-width="2"/>
  <text x="225" y="76" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">A</text>
  <text x="225" y="90" fill="#2dd4a0" font-size="8" text-anchor="middle">active</text>

  <circle cx="525" cy="130" r="30" fill="#f59e4222" stroke="#f59e42" stroke-width="2"/>
  <text x="525" y="126" fill="#f59e42" font-size="10" text-anchor="middle" font-weight="600">B</text>
  <text x="525" y="140" fill="#f59e42" font-size="8" text-anchor="middle">standby</text>

  <circle cx="825" cy="80" r="30" fill="#a78bfa22" stroke="#a78bfa" stroke-width="2"/>
  <text x="825" y="76" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="600">C</text>
  <text x="825" y="90" fill="#a78bfa" font-size="8" text-anchor="middle">quorum</text>

  <!-- zfs-pool resource -->
  <text x="525" y="185" fill="#c8d1dc" font-size="12" text-anchor="middle" font-weight="600">Pacemaker Resource Ordering (runs on active node only)</text>

  <rect x="440" y="198" width="170" height="40" rx="4" fill="#2dd4a022" stroke="#2dd4a0" stroke-width="1.5"/>
  <text x="525" y="215" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">zfs-pool</text>
  <text x="525" y="230" fill="#6b7a8d" font-size="8" text-anchor="middle">start 150s · stop 90s</text>

  <!-- Arrow down to san-services group -->
  <line x1="525" y1="238" x2="525" y2="255" stroke="#2dd4a0" stroke-width="1.5" marker-end="url(#aGrn2)"/>
  <line x1="525" y1="238" x2="850" y2="255" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aGrn2)"/>

  <!-- san-services group box -->
  <rect x="20" y="258" width="700" height="80" rx="6" fill="#22d3ee11" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="370" y="276" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="600">san-services group</text>

  <!-- Resources in san-services -->
  <rect x="35" y="282" width="105" height="44" rx="3" fill="#22d3ee22" stroke="#22d3ee"/>
  <text x="87" y="299" fill="#22d3ee" font-size="9" text-anchor="middle" font-weight="500">vip-enduser</text>
  <text x="87" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">10.30.30.10</text>
  <text x="87" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">IPaddr2</text>

  <text x="151" y="308" fill="#6b7a8d" font-size="14">→</text>

  <rect x="163" y="282" width="110" height="44" rx="3" fill="#22d3ee22" stroke="#22d3ee"/>
  <text x="218" y="299" fill="#22d3ee" font-size="9" text-anchor="middle" font-weight="500">vip-hypervisor</text>
  <text x="218" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">10.40.40.10</text>
  <text x="218" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">IPaddr2</text>

  <text x="284" y="308" fill="#6b7a8d" font-size="14">→</text>

  <rect x="296" y="282" width="115" height="44" rx="3" fill="#3d8bfd22" stroke="#3d8bfd"/>
  <text x="353" y="299" fill="#3d8bfd" font-size="9" text-anchor="middle" font-weight="500">sync-iscsi-luns</text>
  <text x="353" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">systemd oneshot</text>
  <text x="353" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">maps zvols → LUNs</text>

  <text x="422" y="308" fill="#6b7a8d" font-size="14">→</text>

  <rect x="434" y="282" width="100" height="44" rx="3" fill="#22d3ee22" stroke="#22d3ee"/>
  <text x="484" y="299" fill="#22d3ee" font-size="9" text-anchor="middle" font-weight="500">nfs-server</text>
  <text x="484" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">systemd</text>
  <text x="484" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">nfs-kernel-server</text>

  <text x="545" y="308" fill="#6b7a8d" font-size="14">→</text>

  <rect x="557" y="282" width="100" height="44" rx="3" fill="#22d3ee22" stroke="#22d3ee"/>
  <text x="607" y="299" fill="#22d3ee" font-size="9" text-anchor="middle" font-weight="500">smb-server</text>
  <text x="607" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">systemd</text>
  <text x="607" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">smbd</text>

  <!-- cockpit-group box -->
  <rect x="730" y="258" width="300" height="80" rx="6" fill="#a78bfa11" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="880" y="276" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="600">cockpit-group</text>

  <rect x="748" y="282" width="120" height="44" rx="3" fill="#a78bfa22" stroke="#a78bfa"/>
  <text x="808" y="299" fill="#a78bfa" font-size="9" text-anchor="middle" font-weight="500">vip-cockpit</text>
  <text x="808" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">10.20.20.10</text>
  <text x="808" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">IPaddr2</text>

  <text x="879" y="308" fill="#6b7a8d" font-size="14">→</text>

  <rect x="892" y="282" width="120" height="44" rx="3" fill="#a78bfa22" stroke="#a78bfa"/>
  <text x="952" y="299" fill="#a78bfa" font-size="9" text-anchor="middle" font-weight="500">cockpit-service</text>
  <text x="952" y="313" fill="#6b7a8d" font-size="7" text-anchor="middle">systemd</text>
  <text x="952" y="323" fill="#6b7a8d" font-size="7" text-anchor="middle">cockpit.socket</text>

  <!-- Constraints label -->
  <text x="525" y="370" fill="#6b7a8d" font-size="10" text-anchor="middle">Ordering: zfs-pool → san-services AND zfs-pool → cockpit-group · Location: no resources on quorum node</text>
  <text x="525" y="385" fill="#6b7a8d" font-size="9" text-anchor="middle">Stickiness: 200 — prevents unnecessary failback during resilver</text>

  <defs>
    <marker id="aGrn2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#2dd4a0"/></marker>
  </defs>
</svg>
