<svg viewBox="0 0 1050 480" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:1050px;display:block;margin:0 auto;">
  <text x="525" y="22" fill="#ef5350" font-size="14" text-anchor="middle" font-weight="700">Failover Sequence: Node A Dies → Node B Takes Over</text>

  <!-- Timeline -->
  <line x1="80" y1="60" x2="80" y2="460" stroke="#2a3545" stroke-width="2"/>

  <!-- Node A column -->
  <text x="350" y="50" fill="#ef5350" font-size="11" text-anchor="middle" font-weight="600">NODE A (was active)</text>
  <!-- Node B column -->
  <text x="680" y="50" fill="#2dd4a0" font-size="11" text-anchor="middle" font-weight="600">NODE B (standby → active)</text>
  <!-- Quorum column -->
  <text x="950" y="50" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="600">QUORUM (C)</text>

  <!-- T=0 -->
  <circle cx="80" cy="90" r="6" fill="#ef5350"/>
  <text x="55" y="94" fill="#ef5350" font-size="9" text-anchor="end" font-weight="600">T=0</text>
  <rect x="200" y="75" width="300" height="30" rx="4" fill="#ef535022" stroke="#ef5350"/>
  <text x="350" y="95" fill="#ef5350" font-size="10" text-anchor="middle">Node A loses power / kernel panic / crash</text>

  <!-- T=5s -->
  <circle cx="80" cy="140" r="6" fill="#f59e42"/>
  <text x="55" y="144" fill="#f59e42" font-size="9" text-anchor="end" font-weight="600">T≈4s</text>
  <rect x="530" y="125" width="300" height="30" rx="4" fill="#f59e4222" stroke="#f59e42"/>
  <text x="680" y="145" fill="#f59e42" font-size="10" text-anchor="middle">iSCSI sessions to A timeout → LUNs fault</text>

  <!-- T=5s ZFS -->
  <circle cx="80" cy="185" r="6" fill="#2dd4a0"/>
  <text x="55" y="189" fill="#2dd4a0" font-size="9" text-anchor="end" font-weight="600">T≈4s</text>
  <rect x="530" y="170" width="300" height="30" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
  <text x="680" y="190" fill="#2dd4a0" font-size="10" text-anchor="middle">ZFS marks remote halves FAULTED</text>

  <!-- T=10-15s -->
  <circle cx="80" cy="235" r="6" fill="#a78bfa"/>
  <text x="55" y="239" fill="#a78bfa" font-size="9" text-anchor="end" font-weight="600">T≈5s</text>
  <rect x="830" y="220" width="190" height="30" rx="4" fill="#a78bfa22" stroke="#a78bfa"/>
  <text x="925" y="240" fill="#a78bfa" font-size="10" text-anchor="middle">Confirms A is gone</text>
  <rect x="530" y="220" width="280" height="30" rx="4" fill="#a78bfa22" stroke="#a78bfa"/>
  <text x="670" y="240" fill="#a78bfa" font-size="10" text-anchor="middle">Corosync: quorum maintained (B+C = 2/3)</text>

  <!-- STONITH -->
  <circle cx="80" cy="285" r="6" fill="#ef5350"/>
  <text x="55" y="289" fill="#ef5350" font-size="9" text-anchor="end" font-weight="600">T≈7s</text>
  <rect x="200" y="270" width="300" height="30" rx="4" fill="#ef535022" stroke="#ef5350"/>
  <text x="350" y="290" fill="#ef5350" font-size="10" text-anchor="middle">STONITH: smart plug powers off Node A</text>

  <!-- Import -->
  <circle cx="80" cy="335" r="6" fill="#2dd4a0"/>
  <text x="55" y="339" fill="#2dd4a0" font-size="9" text-anchor="end" font-weight="600">T≈8s</text>
  <rect x="530" y="320" width="300" height="30" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
  <text x="680" y="340" fill="#2dd4a0" font-size="10" text-anchor="middle">Pacemaker imports ZFS pool on Node B</text>

  <!-- VIPs -->
  <circle cx="80" cy="380" r="6" fill="#22d3ee"/>
  <text x="55" y="384" fill="#22d3ee" font-size="9" text-anchor="end" font-weight="600">T≈9s</text>
  <rect x="530" y="365" width="300" height="30" rx="4" fill="#22d3ee22" stroke="#22d3ee"/>
  <text x="680" y="385" fill="#22d3ee" font-size="10" text-anchor="middle">VIPs migrate → sync-iscsi-luns → NFS/SMB/iSCSI start</text>

  <!-- Service -->
  <circle cx="80" cy="430" r="6" fill="#2dd4a0"/>
  <text x="55" y="434" fill="#2dd4a0" font-size="9" text-anchor="end" font-weight="600">T≈11s</text>
  <rect x="530" y="415" width="300" height="30" rx="4" fill="#2dd4a022" stroke="#2dd4a0" stroke-width="2"/>
  <text x="680" y="435" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">Clients resume — degraded but serving</text>

  <text x="680" y="465" fill="#6b7a8d" font-size="10" text-anchor="middle">Pool runs degraded on Node B's local disks until A recovers</text>
</svg>
