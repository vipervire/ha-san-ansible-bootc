<svg viewBox="0 0 1050 420" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:1050px;display:block;margin:0 auto;">
  <text x="525" y="25" fill="#2dd4a0" font-size="14" text-anchor="middle" font-weight="700">ZFS Pool: san-pool (multihost=on)</text>

  <!-- Mirror vdevs row 1 -->
  <g transform="translate(30,45)">
    <!-- mirror-0 -->
    <rect x="0" y="0" width="150" height="75" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
    <text x="75" y="18" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">mirror-0</text>
    <rect x="8" y="26" width="134" height="18" rx="2" fill="#2dd4a044"/>
    <text x="75" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: sda (Node A)</text>
    <rect x="8" y="48" width="134" height="18" rx="2" fill="#f59e4233"/>
    <text x="75" y="61" fill="#f59e42" font-size="8" text-anchor="middle">remote: iSCSI (Node B)</text>
  </g>
  <g transform="translate(195,45)">
    <rect x="0" y="0" width="150" height="75" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
    <text x="75" y="18" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">mirror-1</text>
    <rect x="8" y="26" width="134" height="18" rx="2" fill="#2dd4a044"/>
    <text x="75" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: sdb (Node A)</text>
    <rect x="8" y="48" width="134" height="18" rx="2" fill="#f59e4233"/>
    <text x="75" y="61" fill="#f59e42" font-size="8" text-anchor="middle">remote: iSCSI (Node B)</text>
  </g>
  <g transform="translate(360,45)">
    <rect x="0" y="0" width="150" height="75" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
    <text x="75" y="18" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">mirror-2</text>
    <rect x="8" y="26" width="134" height="18" rx="2" fill="#2dd4a044"/>
    <text x="75" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: sdc (Node A)</text>
    <rect x="8" y="48" width="134" height="18" rx="2" fill="#f59e4233"/>
    <text x="75" y="61" fill="#f59e42" font-size="8" text-anchor="middle">remote: iSCSI (Node B)</text>
  </g>
  <text x="560" y="90" fill="#6b7a8d" font-size="24">···</text>
  <g transform="translate(620,45)">
    <rect x="0" y="0" width="150" height="75" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
    <text x="75" y="18" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">mirror-10</text>
    <rect x="8" y="26" width="134" height="18" rx="2" fill="#2dd4a044"/>
    <text x="75" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: sdk (Node A)</text>
    <rect x="8" y="48" width="134" height="18" rx="2" fill="#f59e4233"/>
    <text x="75" y="61" fill="#f59e42" font-size="8" text-anchor="middle">remote: iSCSI (Node B)</text>
  </g>
  <g transform="translate(785,45)">
    <rect x="0" y="0" width="150" height="75" rx="4" fill="#2dd4a022" stroke="#2dd4a0"/>
    <text x="75" y="18" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="600">mirror-11</text>
    <rect x="8" y="26" width="134" height="18" rx="2" fill="#2dd4a044"/>
    <text x="75" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: sdl (Node A)</text>
    <rect x="8" y="48" width="134" height="18" rx="2" fill="#f59e4233"/>
    <text x="75" y="61" fill="#f59e42" font-size="8" text-anchor="middle">remote: iSCSI (Node B)</text>
  </g>

  <!-- SLOG and Special vdevs -->
  <text x="525" y="155" fill="#c8d1dc" font-size="12" text-anchor="middle" font-weight="600">Optional: SLOG + Special Vdevs (Samsung SV843 or similar)</text>

  <g transform="translate(200,170)">
    <rect x="0" y="0" width="260" height="75" rx="4" fill="#f59e4222" stroke="#f59e42"/>
    <text x="130" y="18" fill="#f59e42" font-size="10" text-anchor="middle" font-weight="600">log mirror (SLOG)</text>
    <rect x="8" y="26" width="118" height="18" rx="2" fill="#2dd4a044"/>
    <text x="67" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: SV843-a0</text>
    <rect x="134" y="26" width="118" height="18" rx="2" fill="#f59e4233"/>
    <text x="193" y="39" fill="#f59e42" font-size="8" text-anchor="middle">remote: SV843-b0 (iSCSI)</text>
    <text x="130" y="64" fill="#6b7a8d" font-size="8" text-anchor="middle">Absorbs sync writes · power-loss safe</text>
  </g>

  <g transform="translate(530,170)">
    <rect x="0" y="0" width="260" height="75" rx="4" fill="#a78bfa22" stroke="#a78bfa"/>
    <text x="130" y="18" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="600">special mirror (metadata)</text>
    <rect x="8" y="26" width="118" height="18" rx="2" fill="#2dd4a044"/>
    <text x="67" y="39" fill="#c8d1dc" font-size="8" text-anchor="middle">local: SV843-a1</text>
    <rect x="134" y="26" width="118" height="18" rx="2" fill="#a78bfa33"/>
    <text x="193" y="39" fill="#a78bfa" font-size="8" text-anchor="middle">remote: SV843-b1 (iSCSI)</text>
    <text x="130" y="64" fill="#6b7a8d" font-size="8" text-anchor="middle">Metadata + small blocks · boosts IOPS</text>
  </g>

  <!-- Datasets -->
  <text x="525" y="285" fill="#c8d1dc" font-size="12" text-anchor="middle" font-weight="600">ZFS Datasets &amp; Zvols</text>

  <rect x="40" y="300" width="180" height="50" rx="4" fill="#1a2230" stroke="#2a3545"/>
  <text x="130" y="320" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="500">san-pool/nfs</text>
  <text x="130" y="336" fill="#6b7a8d" font-size="9" text-anchor="middle">NFS exports (datasets)</text>

  <rect x="250" y="300" width="180" height="50" rx="4" fill="#1a2230" stroke="#2a3545"/>
  <text x="340" y="320" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="500">san-pool/smb</text>
  <text x="340" y="336" fill="#6b7a8d" font-size="9" text-anchor="middle">SMB shares (datasets)</text>

  <rect x="460" y="300" width="180" height="50" rx="4" fill="#1a2230" stroke="#2a3545"/>
  <text x="550" y="320" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="500">san-pool/iscsi</text>
  <text x="550" y="336" fill="#6b7a8d" font-size="9" text-anchor="middle">iSCSI zvols (block)</text>

  <rect x="670" y="300" width="200" height="50" rx="4" fill="#1a2230" stroke="#2a3545"/>
  <text x="770" y="320" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="500">san-pool/k3s-pv</text>
  <text x="770" y="336" fill="#6b7a8d" font-size="9" text-anchor="middle">K3s persistent volumes</text>

  <!-- Capacity bar -->
  <rect x="40" y="375" width="930" height="30" rx="4" fill="#1a2230" stroke="#2a3545"/>
  <rect x="42" y="377" width="463" height="26" rx="3" fill="#2dd4a033"/>
  <text x="272" y="395" fill="#2dd4a0" font-size="10" text-anchor="middle" font-weight="500">~12TB usable (50% of 24TB raw)</text>
  <text x="740" y="395" fill="#6b7a8d" font-size="10" text-anchor="middle">12TB mirror overhead</text>
</svg>
