<svg viewBox="0 0 1050 620" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:1050px;display:block;margin:0 auto;">
  <!-- Background regions -->
  <!-- Node A -->
  <rect x="20" y="30" width="340" height="540" rx="8" fill="#111820" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="40" y="58" fill="#2dd4a0" font-size="13" font-weight="600">NODE A — ACTIVE</text>
  <text x="40" y="76" fill="#6b7a8d" font-size="10">storage-a · Proxmox host</text>

  <!-- Node B -->
  <rect x="420" y="30" width="340" height="540" rx="8" fill="#111820" stroke="#f59e42" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="440" y="58" fill="#f59e42" font-size="13" font-weight="600">NODE B — STANDBY</text>
  <text x="440" y="76" fill="#6b7a8d" font-size="10">storage-b · Proxmox host</text>

  <!-- Quorum -->
  <rect x="820" y="30" width="210" height="200" rx="8" fill="#111820" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="840" y="58" fill="#a78bfa" font-size="13" font-weight="600">NODE C — QUORUM</text>
  <text x="840" y="76" fill="#6b7a8d" font-size="10">quorum · VM or Pi</text>

  <!-- Quorum internals -->
  <rect x="845" y="95" width="160" height="35" rx="4" fill="#a78bfa22" stroke="#a78bfa" stroke-width="1"/>
  <text x="925" y="117" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="500">Corosync</text>
  <rect x="845" y="142" width="160" height="35" rx="4" fill="#a78bfa22" stroke="#a78bfa" stroke-width="1"/>
  <text x="925" y="164" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="500">Pacemaker (voter)</text>
  <text x="925" y="210" fill="#6b7a8d" font-size="10" text-anchor="middle">No storage · No services</text>
  <text x="925" y="224" fill="#6b7a8d" font-size="10" text-anchor="middle">Quorum tie-breaker only</text>

  <!-- Node A internals -->
  <!-- Disks -->
  <rect x="45" y="95" width="140" height="50" rx="4" fill="#1a2230" stroke="#2a3545" stroke-width="1"/>
  <text x="115" y="116" fill="#c8d1dc" font-size="10" text-anchor="middle" font-weight="500">12× 1TB SSDs</text>
  <text x="115" y="131" fill="#6b7a8d" font-size="9" text-anchor="middle">Local storage</text>

  <!-- iSCSI Target -->
  <rect x="200" y="95" width="140" height="50" rx="4" fill="#3d8bfd22" stroke="#3d8bfd" stroke-width="1"/>
  <text x="270" y="116" fill="#3d8bfd" font-size="10" text-anchor="middle" font-weight="500">iSCSI Target (LIO)</text>
  <text x="270" y="131" fill="#6b7a8d" font-size="9" text-anchor="middle">Exports local disks</text>

  <!-- iSCSI Initiator -->
  <rect x="45" y="160" width="140" height="40" rx="4" fill="#3d8bfd22" stroke="#3d8bfd" stroke-width="1"/>
  <text x="115" y="185" fill="#3d8bfd" font-size="10" text-anchor="middle" font-weight="500">iSCSI Initiator</text>

  <!-- ZFS Pool -->
  <rect x="45" y="215" width="295" height="85" rx="6" fill="#2dd4a022" stroke="#2dd4a0" stroke-width="1.5"/>
  <text x="192" y="238" fill="#2dd4a0" font-size="12" text-anchor="middle" font-weight="600">ZFS Pool: san-pool</text>
  <text x="192" y="256" fill="#c8d1dc" font-size="10" text-anchor="middle">12 mirror vdevs (local + remote iSCSI)</text>
  <text x="192" y="271" fill="#c8d1dc" font-size="10" text-anchor="middle">multihost=on · 12TB usable</text>
  <text x="192" y="286" fill="#6b7a8d" font-size="9" text-anchor="middle">+ optional SLOG/special mirror vdevs</text>

  <!-- Pacemaker -->
  <rect x="45" y="315" width="140" height="40" rx="4" fill="#a78bfa22" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="340" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="500">Pacemaker / Corosync</text>

  <!-- STONITH -->
  <rect x="200" y="315" width="140" height="40" rx="4" fill="#ef535022" stroke="#ef5350" stroke-width="1"/>
  <text x="270" y="340" fill="#ef5350" font-size="10" text-anchor="middle" font-weight="500">STONITH Agent</text>

  <!-- Services -->
  <rect x="45" y="380" width="295" height="100" rx="6" fill="#22d3ee22" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="192" y="400" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="600">HA Services (on active node)</text>
  <rect x="60" y="412" width="85" height="28" rx="3" fill="#1a2230" stroke="#22d3ee" stroke-width="1"/>
  <text x="102" y="431" fill="#22d3ee" font-size="10" text-anchor="middle">NFS</text>
  <rect x="155" y="412" width="85" height="28" rx="3" fill="#1a2230" stroke="#22d3ee" stroke-width="1"/>
  <text x="197" y="431" fill="#22d3ee" font-size="10" text-anchor="middle">SMB</text>
  <rect x="250" y="412" width="85" height="28" rx="3" fill="#1a2230" stroke="#22d3ee" stroke-width="1"/>
  <text x="292" y="431" fill="#22d3ee" font-size="10" text-anchor="middle">iSCSI Target</text>
  <text x="192" y="466" fill="#6b7a8d" font-size="9" text-anchor="middle">Client-facing iSCSI exports zvols to Proxmox VMs</text>

  <!-- VIPs -->
  <rect x="45" y="500" width="295" height="50" rx="6" fill="#22d3ee11" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="192" y="520" fill="#22d3ee" font-size="10" text-anchor="middle" font-weight="500">Floating VIPs</text>
  <text x="192" y="536" fill="#6b7a8d" font-size="9" text-anchor="middle">vip-enduser · vip-hypervisor · vip-cockpit — follow active node</text>

  <!-- Node B internals -->
  <rect x="445" y="95" width="140" height="50" rx="4" fill="#1a2230" stroke="#2a3545" stroke-width="1"/>
  <text x="515" y="116" fill="#c8d1dc" font-size="10" text-anchor="middle" font-weight="500">12× 1TB SSDs</text>
  <text x="515" y="131" fill="#6b7a8d" font-size="9" text-anchor="middle">Local storage</text>

  <rect x="600" y="95" width="140" height="50" rx="4" fill="#3d8bfd22" stroke="#3d8bfd" stroke-width="1"/>
  <text x="670" y="116" fill="#3d8bfd" font-size="10" text-anchor="middle" font-weight="500">iSCSI Target (LIO)</text>
  <text x="670" y="131" fill="#6b7a8d" font-size="9" text-anchor="middle">Exports local disks</text>

  <rect x="445" y="160" width="140" height="40" rx="4" fill="#3d8bfd22" stroke="#3d8bfd" stroke-width="1"/>
  <text x="515" y="185" fill="#3d8bfd" font-size="10" text-anchor="middle" font-weight="500">iSCSI Initiator</text>

  <!-- Node B ZFS (inactive) -->
  <rect x="445" y="215" width="295" height="85" rx="6" fill="#1a2230" stroke="#2a3545" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="592" y="248" fill="#6b7a8d" font-size="11" text-anchor="middle">ZFS Pool: not imported</text>
  <text x="592" y="268" fill="#6b7a8d" font-size="10" text-anchor="middle">Ready for failover import</text>

  <rect x="445" y="315" width="140" height="40" rx="4" fill="#a78bfa22" stroke="#a78bfa" stroke-width="1"/>
  <text x="515" y="340" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="500">Pacemaker / Corosync</text>

  <rect x="600" y="315" width="140" height="40" rx="4" fill="#ef535022" stroke="#ef5350" stroke-width="1"/>
  <text x="670" y="340" fill="#ef5350" font-size="10" text-anchor="middle" font-weight="500">STONITH Agent</text>

  <rect x="445" y="380" width="295" height="100" rx="6" fill="#1a2230" stroke="#2a3545" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="592" y="435" fill="#6b7a8d" font-size="11" text-anchor="middle">Services idle · waiting for failover</text>

  <!-- iSCSI cross-links -->
  <!-- A target → B initiator -->
  <line x1="340" y1="120" x2="420" y2="178" stroke="#3d8bfd" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <!-- B target → A initiator -->
  <line x1="420" y1="120" x2="340" y2="178" stroke="#3d8bfd" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>

  <text x="380" y="138" fill="#3d8bfd" font-size="9" text-anchor="middle" font-weight="500">iSCSI</text>
  <text x="380" y="150" fill="#3d8bfd" font-size="9" text-anchor="middle">40GbE</text>

  <!-- Corosync links -->
  <line x1="340" y1="335" x2="420" y2="335" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="760" y1="335" x2="820" y2="158" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="340" y1="320" x2="820" y2="140" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Clients -->
  <rect x="120" y="580" width="540" height="30" rx="4" fill="#1a2230" stroke="#2a3545" stroke-width="1"/>
  <text x="390" y="600" fill="#6b7a8d" font-size="11" text-anchor="middle">Clients: Proxmox VMs · K3s pods · NFS/SMB workstations — connect to VIPs</text>

  <line x1="192" y1="550" x2="300" y2="580" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowCyan)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3d8bfd"/></marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22d3ee"/></marker>
  </defs>
</svg>
