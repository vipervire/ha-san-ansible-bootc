---
# molecule/default/verify.yml — Verify roles applied correctly in Docker
# Tests are read-only checks against the converged container state.

- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Verify nftables is installed
      ansible.builtin.command: nft --version
      changed_when: false
      register: nft_version
      failed_when: nft_version.rc != 0

    - name: Verify nftables ruleset is loaded
      ansible.builtin.command: nft list ruleset
      changed_when: false
      register: nft_ruleset
      failed_when: nft_ruleset.rc != 0

    - name: Verify SSH hardening config is deployed
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config.d/90-hardening.conf
      register: ssh_hardening_stat
      failed_when: not ssh_hardening_stat.stat.exists

    - name: Verify sysctl hardening config is deployed
      ansible.builtin.stat:
        path: /etc/sysctl.d/90-hardening.conf
      register: sysctl_hardening_stat
      failed_when: not sysctl_hardening_stat.stat.exists

    - name: Verify chrony is installed
      ansible.builtin.command: chronyc --version
      changed_when: false
      register: chrony_version
      failed_when: chrony_version.rc != 0

    - name: Verify faillock configuration is deployed
      ansible.builtin.stat:
        path: /etc/security/faillock.conf
      register: faillock_stat
      failed_when: not faillock_stat.stat.exists

    - name: Verify node_exporter is installed
      ansible.builtin.stat:
        path: /usr/bin/prometheus-node-exporter
      register: node_exporter_stat
      failed_when: not node_exporter_stat.stat.exists

    - name: Verify textfile collector directory exists
      ansible.builtin.stat:
        path: /var/lib/prometheus/node-exporter
      register: textfile_dir_stat
      failed_when: not textfile_dir_stat.stat.isdir

    - name: Verify required packages are installed
      ansible.builtin.package_facts:
        manager: apt

    - name: Assert required packages present
      ansible.builtin.assert:
        that:
          - "'nftables' in ansible_facts.packages"
          - "'chrony' in ansible_facts.packages"
          - "'prometheus-node-exporter' in ansible_facts.packages"
        fail_msg: "One or more required packages are missing"
