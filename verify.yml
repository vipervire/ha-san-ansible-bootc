---
# verify.yml — Post-deployment verification playbook
#
# Runs a set of read-only checks to confirm the cluster is healthy after deployment.
# Does NOT make any changes to the system.
#
# Usage:
#   ansible-playbook -i inventory.yml verify.yml
#   ansible-playbook -i inventory.yml verify.yml --limit storage-a
#

- name: Verify cluster health
  hosts: storage_nodes
  gather_facts: true
  tasks:
    - name: Check Pacemaker cluster status
      ansible.builtin.command: pcs status
      register: pcs_status
      changed_when: false
      failed_when: >
        'FAILED' in pcs_status.stdout or
        'offline' in pcs_status.stdout.lower()

    - name: Show cluster status
      ansible.builtin.debug:
        msg: "{{ pcs_status.stdout_lines }}"

    - name: Check ZFS pool health
      ansible.builtin.command: zpool status -x
      register: zpool_status
      changed_when: false
      failed_when: >
        'errors:' in zpool_status.stdout and
        'No known data errors' not in zpool_status.stdout

    - name: Show pool status
      ansible.builtin.debug:
        msg: "{{ zpool_status.stdout_lines }}"

    - name: Check iSCSI sessions established
      ansible.builtin.command: iscsiadm -m session
      register: iscsi_sessions
      changed_when: false
      failed_when: iscsi_sessions.rc != 0

    - name: Show iSCSI sessions
      ansible.builtin.debug:
        msg: "{{ iscsi_sessions.stdout_lines }}"

    - name: Check node_exporter is accessible
      ansible.builtin.uri:
        url: "http://{{ mgmt_ip }}:9100/metrics"
        return_content: false
        timeout: 10
      register: node_exporter_check
      failed_when: node_exporter_check.status != 200

    - name: Check ha_cluster_exporter is accessible
      ansible.builtin.uri:
        url: "http://{{ mgmt_ip }}:9664/metrics"
        return_content: false
        timeout: 10
      register: ha_exporter_check
      failed_when: ha_exporter_check.status != 200
      when: ha_cluster_monitoring_enabled | default(true)

    - name: Check STONITH probe timer is active
      ansible.builtin.systemd:
        name: stonith-probe.timer
      register: stonith_timer
      failed_when: stonith_timer.status.ActiveState != 'active'

    - name: Verify NTP is synchronized
      ansible.builtin.command: chronyc tracking
      register: ntp_status
      changed_when: false

    - name: Show NTP status
      ansible.builtin.debug:
        msg: "{{ ntp_status.stdout_lines }}"

    - name: Report verification complete
      ansible.builtin.debug:
        msg: "All verification checks passed on {{ inventory_hostname }}"
